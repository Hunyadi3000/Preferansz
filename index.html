<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Preferansz</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#082808;font-family:Georgia,serif;color:#fff;overscroll-behavior:none;}
  button,input{font-family:Georgia,serif;}
  #app{min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;}
  input{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);color:#fff;
    border-radius:8px;padding:10px 14px;font-size:16px;width:100%;outline:none;}
  input::placeholder{color:rgba(255,255,255,0.4);}
  input:focus{border-color:#f9a825;}
  .code{font-size:36px;font-weight:bold;letter-spacing:8px;color:#ffee58;
    background:rgba(0,0,0,0.4);border-radius:12px;padding:16px 24px;
    text-align:center;border:2px dashed rgba(255,238,88,0.5);cursor:pointer;
    user-select:all;-webkit-user-select:all;}
  .rules-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);
    z-index:100;overflow-y:auto;padding:20px;}
  .rules-content{max-width:460px;margin:0 auto;line-height:1.7;font-size:13px;color:#e0e0e0;}
  .rules-content h2{color:#ffcc02;margin:16px 0 6px;font-size:16px;}
  .rules-content h3{color:#a5d6a7;margin:12px 0 4px;font-size:14px;}
  .rules-content p{margin-bottom:8px;}
  .rules-content ul{margin-left:18px;margin-bottom:8px;}
  .rules-content li{margin-bottom:4px;}
  .rules-content table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:12px;}
  .rules-content td,.rules-content th{border:1px solid rgba(255,255,255,0.15);padding:5px 8px;}
  .rules-content th{background:rgba(249,168,37,0.2);color:#ffcc02;}
</style>
</head>
<body>
<div id="app"><div style="color:#a5d6a7;text-align:center;padding:60px 20px;font-size:14px;">Betöltés...</div></div>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ═══ ÁLLANDÓK ═══════════════════════════════════════════════
const SUITS=['zold','sarga','piros','makk'];
const SI={
  zold:{n:'Zöld',col:'#2e7d32',dark:'#1b5e20'},
  sarga:{n:'Sárga',col:'#e65100',dark:'#bf360c'},
  piros:{n:'Piros',col:'#c62828',dark:'#7f0000'},
  makk:{n:'Makk',col:'#5d3a1a',dark:'#3e2006'}
};
const VALS=['7','8','9','10','A','F','K','Á'];
const VR={'7':0,'8':1,'9':2,'10':3,'A':4,'F':5,'K':6,'Á':7};

// Játékok: id = licit érték, n = név, trump = tromf szín (null=nincs), tp = típus, tgt = cél vitelek
const GAMES=[
  {id:2,n:'Zöld',trump:'zold',tp:'color',tgt:6},
  {id:3,n:'Sárga',trump:'sarga',tp:'color',tgt:6},
  {id:4,n:'Piros',trump:'piros',tp:'color',tgt:6},
  {id:5,n:'Makk',trump:'makk',tp:'color',tgt:6},
  {id:6,n:'Betli',trump:null,tp:'betli',tgt:0},
  {id:7,n:'Mizer',trump:null,tp:'mizer',tgt:1},
  {id:8,n:'Szanadu',trump:null,tp:'szanadu',tgt:6},
  {id:9,n:'Pikkoló',trump:null,tp:'pikkolo',tgt:2},
  {id:10,n:'Preferansz',trump:null,tp:'preferansz',tgt:6}
];
const G='#1b5e20',DG='#082808';

// ═══ HÁLÓZAT ════════════════════════════════════════════════
let peer=null, isHost=false, myIndex=0;
let pNames=['Gazda','Vendég 1','Vendég 2'];
let roomCode='';
let pConns=[null,null,null];
let hostConn=null;
let netPhase='lobby';
let joinedCount=0;
let myNameInput='', joinCodeInput='';
let netError='';
let showRules=false;
let jatekModeActive=false; // Ha true, a következő licit "Játék" módban megy (talon rejtett, dupla)

// ═══ BOT KONFIGURÁCIÓ ═══════════════════════════════════════
let botConfig=[false,false]; // botConfig[0]=játékos1 bot?, botConfig[1]=játékos2 bot?
let botDifficulty='normal'; // 'easy' | 'normal' | 'hard'

function genCode(){return Math.random().toString(36).slice(2,8).toUpperCase();}

function doHost(name){
  myNameInput=name; pNames[0]=name;
  isHost=true; myIndex=0; netError='';
  roomCode=genCode();
  netPhase='hosting';
  _makePeer(roomCode);
}

function startWithBots(name, bot1, bot2, diff){
  myNameInput=name;
  isHost=true; myIndex=0; netError='';
  botConfig=[bot1,bot2];
  botDifficulty=diff||'normal';
  const botNames=['Koppány bot','Béla bot'];
  pNames=[name, bot1?botNames[0]:'Vendég 1', bot2?botNames[1]:'Vendég 2'];
  if(bot1&&bot2){
    joinedCount=2;
    netPhase='playing';
    startRound();
  } else {
    // Botok már foglalnak helyet – joinedCount = botok száma
    joinedCount=(bot1?1:0)+(bot2?1:0);
    roomCode=genCode();
    netPhase='hosting';
    _makePeer(roomCode);
  }
}

function _makePeer(id){
  if(peer){try{peer.destroy();}catch(e){}}
  peer=new Peer(id,{debug:0,config:{
    iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'},
    ]
  }});
  peer.on('error',err=>{
    if(err.type==='unavailable-id'&&isHost){roomCode=genCode();_makePeer(roomCode);return;}
    netError='Hálózati hiba: '+err.type+' – '+err.message;
    netPhase='lobby';render();
  });
  peer.on('open',()=>{render();});
  if(isHost){
    peer.on('connection',conn=>{
      let connIdx=null;
      conn.on('open',()=>{
        conn.on('data',data=>{
          if(data.type==='hello'){
            if(joinedCount>=2){conn.send({type:'full'});conn.close();return;}
            // Megkeressük az első szabad (nem-bot) helyet
            let connIdx=-1;
            for(let i=1;i<=2;i++){
              if(!botConfig[i-1]&&!pConns[i]){connIdx=i;break;}
            }
            if(connIdx===-1){conn.send({type:'full'});conn.close();return;}
            pNames[connIdx]=data.name;
            pConns[connIdx]=conn;
            joinedCount++;
            conn.send({type:'welcome',myIndex:connIdx,names:pNames});
            _broadcastPlayers();
            if(joinedCount>=2) netPhase='ready';
            render();
          } else if(data.type==='action'){
            const idx=connIdx!==null?connIdx:_connIdx(conn);
            if(idx>0) _handleAction(data.action,idx);
          } else if(data.type==='ping'){
            conn.send({type:'pong'});
          }
        });
        conn.on('close',()=>{netPhase='disconnected';render();});
        conn.on('error',()=>{netPhase='disconnected';render();});
      });
    });
  }
}

function _connIdx(c){return pConns.indexOf(c);}

function doJoin(name,code){
  myNameInput=name; netError='';
  isHost=false; netPhase='joining';
  render();
  if(peer){try{peer.destroy();}catch(e){}}
  peer=new Peer(undefined,{debug:0,config:{
    iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'},
    ]
  }});
  peer.on('error',err=>{
    netError='Hiba: '+err.type+' – Ellenőrizd a kódot és az internetkapcsolatot!';
    netPhase='lobby';render();
  });
  peer.on('open',()=>{
    let conn;
    try{
      conn=peer.connect(code.trim().toUpperCase(),{reliable:true,serialization:'json'});
    }catch(e){
      netError='Nem sikerült csatlakozni! Hibás szobakód?';
      netPhase='lobby';render();return;
    }
    hostConn=conn;
    // Timeout: 12mp alatt nem nyílik meg → hiba
    const timeout=setTimeout(()=>{
      if(netPhase==='joining'){
        netError='Időtúllépés! A gazda nem elérhető. Ellenőrizd a kódot.';
        netPhase='lobby';
        try{conn.close();}catch(e){}
        render();
      }
    },12000);
    conn.on('open',()=>{
      clearTimeout(timeout);
      conn.send({type:'hello',name});
      // Keepalive ping minden 20mp-ben hogy ne szakadjon meg
      const keepalive=setInterval(()=>{
        if(conn.open) conn.send({type:'ping'});
        else clearInterval(keepalive);
      },20000);
    });
    conn.on('data',data=>{
      if(data.type==='welcome'){
        myIndex=data.myIndex;pNames=data.names;netPhase='waiting';render();
      } else if(data.type==='full'){
        netError='A szoba tele van!';netPhase='lobby';render();
      } else if(data.type==='players'){
        pNames=data.names;render();
      } else if(data.type==='state'){
        state=data.state;pNames=data.names||pNames;netPhase='playing';render();
      }
    });
    conn.on('close',()=>{
      clearTimeout(timeout);
      if(netPhase==='waiting'||netPhase==='playing'){netPhase='disconnected';render();}
    });
    conn.on('error',err=>{
      clearTimeout(timeout);
      netError='Kapcsolati hiba: '+(err.message||err.type||'ismeretlen');
      netPhase='lobby';render();
    });
  });
}

function _broadcastPlayers(){
  [1,2].forEach(i=>{if(pConns[i]&&pConns[i].open)pConns[i].send({type:'players',names:pNames});});
}
function broadcastState(){
  if(!isHost)return;
  const msg={type:'state',state,names:pNames};
  [1,2].forEach(i=>{if(pConns[i]&&pConns[i].open)pConns[i].send(msg);});
}
function sendAction(action){
  if(isHost){_handleAction(action,0);}
  else if(hostConn&&hostConn.open){hostConn.send({type:'action',action});}
}
function _handleAction(action,fromIdx){
  if(!isHost)return;
  if(fromIdx>0&&botConfig[fromIdx-1])return; // bot saját maga cselekszik
  const s=state;
  if(action.kind==='bid'&&s.phase==='bid'&&s.bidder===fromIdx){processBid(fromIdx,action.amount,action.isJatek||false);}
  else if(action.kind==='play'&&s.phase==='play'&&s.curP===fromIdx){
    const card=s.hands[fromIdx].find(c=>c.id===action.cardId);
    if(card)_doPlay(fromIdx,card);
  } else if(action.kind==='discard'&&s.phase==='discard'&&s.bidWinner===fromIdx){
    _doDiscard(action.cardId);
  } else if(action.kind==='pickGame'&&s.phase==='selectGame'&&s.bidWinner===fromIdx){
    const g=GAMES.find(g=>g.id===action.gameId);
    if(g)_doPickGame(g);
  } else if(action.kind==='earlyBid'&&s.phase==='bid'&&s.bidder===fromIdx){
    _doEarlyBid(fromIdx,action.gameId);
  }
}

// ═══ JÁTÉK ÁLLAPOT ══════════════════════════════════════════
// scores: saját pontszám (fent, negatívból indul)
// cellar: "pince" sorok [{from:i, to:j, val:x}] – j játékosra i játékostól írt érték
// startScore: megegyezés szerinti kezdőpont
let state={
  phase:'result',
  hands:[[],[],[]],
  talon:[],
  bidder:0,
  highBid:0,
  highBidder:null,
  passed:[false,false,false],
  activeCnt:3,
  game:null,
  bidWinner:null,
  trick:[],
  tw:[0,0,0],
  curP:0,
  msg:'',
  scores:[-10,-10,-10],
  cellar:[], // [{from,to,val}]
  log:[],
  showTalon:false,
  liftedCard:null,
  resultMsg:'Üdvözlet! A gazda indítja az első kört.',
  passCount:0, // körpasszok száma
  dealerIdx:0, // ki az osztó
  startScore:-10,
  round:0,
  isJatekRound:false, // Ha true: talon rejtett, pontok duplán számolnak
  jatekResponseMode:false, // Ha true: Játék elhangzott, következő játékos felülbírálhat
  gameOver:false
};

function addLog(m){state.log=[m,...state.log].slice(0,20);}
function after(){render();broadcastState();_scheduleBots();}

function startRound(){
  if(!isHost)return;
  const deck=_shuffle(_mkDeck());
  const r=state.round+1;
  const dealer=state.dealerIdx;
  addLog(`── ${r}. kör · Osztó: ${pNames[dealer]} ──`);
  // Kiosztás: először 5-5 lap, talon, majd maradék 5-5
  const h0=deck.slice(0,5), h1=deck.slice(5,10), h2=deck.slice(10,15);
  const talon=deck.slice(15,17);
  const h0b=deck.slice(17,22), h1b=deck.slice(22,27), h2b=deck.slice(27,32);
  // Licitálást az osztótól jobbra ülő kezdi (= (dealer+1)%3)
  const firstBidder=(dealer+1)%3;
  state={...state,
    phase:'bid',
    hands:[[...h0,...h0b],[...h1,...h1b],[...h2,...h2b]],
    talon,
    bidder:firstBidder,
    highBid:0,
    highBidder:null,
    passed:[false,false,false],
    activeCnt:3,
    game:null,
    bidWinner:null,
    trick:[],
    tw:[0,0,0],
    showTalon:false,
    liftedCard:null,
    resultMsg:'',
    round:r,
    trickHistory:[],
    lastTrickWinner:null,
    isJatekRound:false,
    jatekResponseMode:false,
    msg:`${pNames[firstBidder]} licitál...`
  };
  after();
}

// ═══ LICITÁLÁS ══════════════════════════════════════════════
function processBid(pl,amount,isJatek){
  const np=[...state.passed];
  let nHB=state.highBid,nHBr=state.highBidder,nAct=state.activeCnt;
  if(amount){
    // "Játék" módban: talon rejtett, dupla pont – de csak ha ténylegesen ugrik
    if(isJatek&&amount>nHB+1){
      // Érvényes ugró licit Játék módban
      nHB=amount; nHBr=pl;
      addLog(`${pNames[pl]}: JÁTÉK – ${amount} (${GAMES.find(g=>g.id===amount)?.n||''}) – talon rejtett, dupla!`);
      // Jelöljük a state-ben hogy ez "Játék" körnek számít
      state={...state,isJatekRound:true};
    } else if(!isJatek&&amount===nHB+1){
      // Normál +1 licit
      nHB=amount; nHBr=pl;
      addLog(`${pNames[pl]}: ${amount} – ${GAMES.find(g=>g.id===amount)?.n||''}`);
    } else if(amount>nHB){
      // Ugró licit Játék gomb nélkül: nem engedjük
      state={...state,msg:'⚠️ Csak egyesével emelhetsz! Nagyobb ugráshoz nyomd meg a 🎯 Játék gombot!'};
      after(); return;
    }
  } else {
    np[pl]=true; nAct--;
    addLog(`${pNames[pl]}: Passz`);
  }
  state={...state,passed:np,highBid:nHB,highBidder:nHBr,activeCnt:nAct};
  // Ha Játékot mondtak (ugró licit): licit azonnal véget ér, kivéve ha valaki nagyobb Játékkal felülbírálja
  if(isJatek&&amount){
    let nx=(pl+1)%3; while(np[nx]&&nx!==pl)nx=(nx+1)%3;
    if(nx===pl||np[nx]){
      _resolveAuction(nHBr,nHB); return;
    }
    state={...state,bidder:nx,jatekResponseMode:true,
      msg:`🎯 JÁTÉK! (${nHB}·${GAMES.find(g=>g.id===nHB)?.n||''}) ${pNames[nx]}: mondasz nagyobb Játékot?`};
    after(); return;
  }
  // Normál licit folytatása
  if(nAct===0||(nAct<=1&&nHBr!==null)||nHB>=10){_resolveAuction(nHBr,nHB);return;}
  let nx=(pl+1)%3; while(np[nx])nx=(nx+1)%3;
  state={...state,bidder:nx,msg:`${pNames[nx]} licitál...`};
  after();
}

// Korai licit (első 5 lap után, értéke duplázódik, talon nem vehető fel)
function _doEarlyBid(pl,gameId){
  const g=GAMES.find(x=>x.id===gameId);
  if(!g)return;
  addLog(`${pNames[pl]}: JÁTÉK – ${g.n} (dupla érték, talon nélkül)`);
  // Ha valaki már mondott korai licitet, az kell legyen nagyobb
  // Egyszerűsítés: elfogadjuk, ha nagyobb mint a jelenlegi highBid
  if(gameId<=state.highBid){
    state={...state,msg:'⚠️ Nagyobbat kell mondani!'};after();return;
  }
  // A korai játékos megnyeri a licitet, de nem veszi fel a talont; érték dupla
  const modG={...g,id:g.id*2,earlyBid:true};
  const nh=state.hands.map(h=>[...h]);
  // Talon marad, de a játékos nem veszi fel
  addLog(`${pNames[pl]} nyerte (korai, dupla: ${modG.id})`);
  state={...state,game:modG,bidWinner:pl,showTalon:false,liftedCard:null};
  // Talon latható mindenkivel
  state={...state,showTalon:true,msg:`${pNames[pl]} korai játékot vállalt: ${g.n} (dupla). Talon látható!`,phase:'earlyDiscard'};
  after();
  // 2s múlva elkezdik dobni
  setTimeout(()=>{
    // A játékosnak nincs mit dobnia (nem vette fel a talont), egyből játék
    const sp=g.tp==='color'?((pl+1)%3):((pl+2)%3);
    state={...state,showTalon:false,curP:sp,phase:'play',msg:`${g.n} (dupla) – ${pNames[sp]} kezd!`};
    after();
  },2500);
}

function _resolveAuction(winner,winBid){
  if(winner===null||winner===undefined){
    // KÖRPASSZ
    addLog('Körpassz!');
    // Osztó kijátsza egymás után a 2 talonlapját
    state={...state,
      phase:'passRound',
      bidWinner:null,
      showTalon:true,
      msg:'Körpassz! Az osztó kijátsza a talon 2 lapját...',
      passCount:state.passCount+1
    };
    after();
    setTimeout(()=>_playPassRound(),2000);
    return;
  }
  state={...state,bidWinner:winner,showTalon:!state.isJatekRound};
  addLog(`${pNames[winner]} nyerte a licitet (${winBid} – ${GAMES.find(g=>g.id>=winBid)?.n})${state.isJatekRound?' [JÁTÉK – talon rejtett, dupla]':''}`);
  if(state.isJatekRound){
    // Játék kör: talon REJTETT, egyből játékot választ a talon nélkül
    state={...state,msg:`🎯 JÁTÉK KÖR! ${pNames[winner]} talon nélkül választ játékot. (Dupla pont + dupla pince!)`,phase:'selectGame'};
  } else {
    state={...state,msg:`${pNames[winner]} megnézi a talont! Válasszon játékot.`,phase:'selectGame'};
  }
  after();
}

function _playPassRound(){
  // Körpasszban az osztó kijátsza a talon 2 lapját, mindenki látja
  // A vitelek normálisan zajlanak, de az a cél, hogy minél KEVESEBB vitel legyen
  // Egyszerűsítés: az osztó feltárja a talont, majd azokat az asztalra rakjuk
  // A körpassz pontszámolása: elvitt viteleket levonják a saját pontból
  // Ehhez szimuláljuk: a talon 2 lapja az osztó nevében kerül ki
  const dealer=state.dealerIdx;
  const talonCards=[...state.talon];
  // Hozzáadjuk a talon lapjait az osztó kezéhez
  const nh=state.hands.map((h,i)=>i===dealer?[...h,...talonCards]:h);
  state={...state,hands:nh,talon:[],showTalon:false,
    phase:'play',curP:dealer,
    game:{id:0,n:'Körpassz',trump:null,tp:'passround',tgt:0},
    msg:`Körpassz – ${pNames[dealer]} (osztó) kezd!`
  };
  after();
}

function _doPickGame(g){
  const nh=state.hands.map(h=>[...h]);
  const bw=state.bidWinner;
  const isJatek=state.isJatekRound;
  if(!isJatek){
    // Normál: felveszi a talont
    nh[bw]=[...nh[bw],...state.talon];
  }
  const modG=isJatek?{...g,id:g.id,jatekBid:true}:g; // jelöljük ha Játék kör
  addLog(`Játék: ${g.n} (${pNames[bw]})${isJatek?' [JÁTÉK – talon rejtett, dupla]':''}`);
  if(isJatek){
    // Talon rejtett marad, nincs eldobás – egyből játszunk
    let sp;
    if(g.tp==='color') sp=(bw+1)%3;
    else if(g.tp==='preferansz') sp=(bw+1)%3;
    else sp=((bw-1+3)%3);
    state={...state,game:modG,hands:nh,showTalon:false,liftedCard:null,
      curP:sp,phase:'play',msg:`🎯 JÁTÉK: ${g.n} (dupla) – ${pNames[sp]} kezd!`};
  } else {
    state={...state,game:modG,hands:nh,showTalon:false,liftedCard:null,
      phase:'discard',msg:`${pNames[bw]} eldob 2 lapot...`};
  }
  after();
}

function _doDiscard(cardId){
  const nh=state.hands.map(h=>[...h]);
  const bw=state.bidWinner;
  nh[bw]=nh[bw].filter(c=>c.id!==cardId);
  if(nh[bw].length===10){
    // Színjátéknál az első osztottnál kezd (= osztótól jobbra ülő)
    // Egyéb játéknál a licitnyertes előtti játékos (= licitnyertes-1)
    const g=state.game;
    let sp;
    if(g.tp==='color'){
      sp=(state.dealerIdx+1)%3;
    } else if(g.tp==='preferansz'){
      // Preferansz: licitnyertes 2. lapot tesz, az ellenfél kezd
      sp=(bw+1)%3;
    } else {
      sp=((bw-1)+3)%3;
    }
    state={...state,hands:nh,liftedCard:null,curP:sp,phase:'play',
      msg:`${g.n} – ${pNames[sp]} kezd!`};
  } else {
    state={...state,hands:nh,liftedCard:null,
      msg:`${pNames[state.bidWinner]}: még ${nh[state.bidWinner].length-10} lapot dob el`};
  }
  after();
}

// ═══ JÁTÉKSZABÁLYOK – LAP VALIDÁCIÓ ═══════════════════════
function _isValidPlay(pl,card){
  const s=state;
  const g=s.game;
  if(!g)return true;
  const trick=s.trick;
  if(trick.length===0)return true; // első játékos mindig mehet
  const leadSuit=trick[0].card.s;
  const hand=s.hands[pl];
  const hasSuit=hand.some(c=>c.s===leadSuit);
  if(hasSuit&&card.s!==leadSuit){return false;} // kötelező színre
  if(!hasSuit&&g.tp==='color'&&g.trump){
    const hasTrump=hand.some(c=>c.s===g.trump);
    if(hasTrump&&card.s!==g.trump){return false;} // kötelező tromf
  }
  return true;
}

// Pikkoló: az egymás utáni vitelek tiltottak
function _pikkoloCheckValid(pl,card){
  const s=state;
  // Ha az előző vitelünk volt, nem vihetünk rögtön
  if(s.lastTrickWinner===pl&&s.tw[pl]>0){
    // Nem rakhatja ki azt a lapot ami kötelezné a vitelre – de a kézből bármit megtehet
    // Valójában: játszhat bármit, de a szabály a vitelekre vonatkozik (nem a kijátszásra)
    // Pikkoló: nem VIHET egymás utáni vitelt
    // Ez azt jelenti, ha az előző vitelt ő vitte, most úgy kell játszani, hogy valaki más vigyen
    // A játékos bármit kijátszhat, de nem törekszik vitelre - ez nem korlátozza a kijátszást
  }
  return true;
}

// ═══ MENET LOGIKA ════════════════════════════════════════════
function _doPlay(pl,card){
  const nh=state.hands.map((h,i)=>i===pl?h.filter(c=>c.id!==card.id):h);
  const nt=[...state.trick,{pl,card}];
  state={...state,hands:nh,trick:nt,liftedCard:null};
  if(nt.length<3){
    const nx=(pl+1)%3;
    state={...state,curP:nx,msg:`${pNames[nx]} köre...`};
    after();return;
  }
  // Menet vége
  const w=_trickWinner(nt,state.game?.trump,state.game?.tp);
  const nTW=[...state.tw]; nTW[w]++;
  const trickNum=nTW[0]+nTW[1]+nTW[2]; // hányadik menet végzett
  const leadSuit=nt[0]?.card?.s||null;
  const nHistory=[...(state.trickHistory||[]),{winner:w,trickNum,leadSuit}];
  addLog(`${pNames[w]} viszi → [${nTW.map((t,i)=>pNames[i][0]+':'+t).join(' ')}]`);
  state={...state,tw:nTW,lastTrickWinner:w,trickHistory:nHistory};

  if(nh[0].length===0&&nh[1].length===0&&nh[2].length===0){
    state={...state,phase:'evaluating',trick:nt,msg:'Utolsó menet...'};
    after();
    setTimeout(()=>{state={...state,trick:[]};_evalGame(nTW);},1800);
  } else {
    state={...state,phase:'between'};
    after();
    setTimeout(()=>{state={...state,trick:[],curP:w,phase:'play',msg:`${pNames[w]} kezd...`};after();},1500);
  }
}

function _trickWinner(trick,trump,gameType){
  const lead=trick[0].card.s;
  return trick.reduce((best,cur)=>{
    const bs=best.card.s, cs=cur.card.s;
    let bp=0,cp=0;
    if(trump){
      bp=(bs===trump?200:bs===lead?10:0)+VR[best.card.v];
      cp=(cs===trump?200:cs===lead?10:0)+VR[cur.card.v];
    } else {
      bp=(bs===lead?10:0)+VR[best.card.v];
      cp=(cs===lead?10:0)+VR[cur.card.v];
    }
    return cp>bp?cur:best;
  }).pl;
}

// ═══ PONTOZÁS ════════════════════════════════════════════════
// scores[i] = saját pontszám (fent), negatívból indul, 0-ra kell eljutni
// cellar = [{from, to, val}] pince bejegyzések
// Végső pontszám: saját pontszám – (mások által rám írt pince összege / 100)

function _evalGame(finalTW){
  const bw=state.bidWinner;
  const g=state.game;
  const got=bw!==null?finalTW[bw]:0;
  let resultText='';
  const ns=[...state.scores];
  const newCellar=[...state.cellar];

  if(g.tp==='passround'){
    // Körpassz: elvitt vitelek számát kivonják a saját pontból
    finalTW.forEach((tw,i)=>{
      ns[i]=ns[i]-tw;
    });
    resultText=`Körpassz vége. Vitelek: ${finalTW.map((t,i)=>pNames[i][0]+':'+t).join(', ')}`;
    addLog(resultText);
  } else {
    let won=false;
    const isJatek=state.isJatekRound||state.game?.jatekBid||false;
    const baseVal=g.id;
    const gameVal=isJatek?baseVal*2:baseVal; // Korai liciten már dupla van benne; Játék körben is dupla

    if(g.tp==='color'||g.tp==='szanadu'){
      won=got>=g.tgt;
    } else if(g.tp==='preferansz'){
      // Preferansz: min. 6 PIROS vitel kell a licitnyertesnek (más vitel is lehet, nincs tromf)
      const pirosWins=(state.trickHistory||[]).filter(t=>t.winner===bw&&t.leadSuit==='piros').length;
      won=pirosWins>=6;
      addLog('Piros vitelei ('+pNames[bw]+'): '+pirosWins+'/6 kell');
    } else if(g.tp==='betli'){won=got===0;}
    else if(g.tp==='mizer'){won=got===1&&!_mizerFirstOrLast(finalTW,bw);}
    else if(g.tp==='pikkolo'){won=got===2&&_pikkoloValid(bw);}

    if(won){
      ns[bw]=ns[bw]+gameVal;
      const opp=[0,1,2].filter(i=>i!==bw);
      // Nyerés: az ellenfél elvitt vitelei alapján pincébe írunk rájuk
      // (Preferanszban: minden vitelük gameVal értékű – licitnyertes a pincébe írja)
      opp.forEach(o=>{
        const oppTw=finalTW[o];
        if(oppTw>0){
          const v=oppTw*gameVal;
          newCellar.push({from:bw,to:o,val:v,desc:`${oppTw} vitel × ${gameVal}`});
        }
      });
      if(g.tp==='betli') resultText=`✓ ${pNames[bw]} MEGNYERTE: ${g.n} – 0 vitel, tökéletes!`;
      else if(g.tp==='mizer') resultText=`✓ ${pNames[bw]} MEGNYERTE: ${g.n} – 1 vitel, nem 1. és nem utolsó`;
      else if(g.tp==='pikkolo') resultText=`✓ ${pNames[bw]} MEGNYERTE: ${g.n} – 2 vitel, nem egymás után`;
      else resultText=`✓ ${pNames[bw]} MEGNYERTE: ${g.n} (${got}/${g.tgt} vitel)`;
      addLog(resultText);
    } else {
      ns[bw]-=gameVal;
      if(g.tp==='betli'||g.tp==='mizer'||g.tp==='pikkolo'){
        // Bukás: mindkét ellenfél pincébe ír a vesztesre (gameVal × 5)
        const opp=[0,1,2].filter(i=>i!==bw);
        opp.forEach(o=>newCellar.push({from:o,to:bw,val:gameVal*5,desc:`${g.n} bukás × 5`}));
        const reason=g.tp==='betli'?`${got} vitelt vitt`
          :g.tp==='mizer'?`${got} vitelt vitt${got===1?' (de 1. vagy utolsó volt)':''}`
          :`${got} vitelt vitt${got===2?' (egymás után)':''}`;
        resultText=`✗ ${pNames[bw]} MEGBUKOTT: ${g.n} (${reason}) – saját pont -${gameVal}, ellene ${gameVal*5}/fő pincébe`;
        addLog(resultText);
      } else {
        // Színjáték / Szanadu / Preferansz bukás
        // Ellenfél is kaphat büntetést ha 0 vitelt vitt (aláhúzás sikertelen)
        const opp=[0,1,2].filter(i=>i!==bw);
        opp.forEach(o=>{
          if(finalTW[o]===0){
            ns[o]-=1;
            newCellar.push({from:bw,to:o,val:gameVal,desc:`Aláhúzás sikertelen (0 vitel)`});
            addLog(`${pNames[o]} aláhúzás megbukott (0 vitel) – -1 pont, ${gameVal} pince`);
          }
        });
        resultText=`✗ ${pNames[bw]} MEGBUKOTT: ${g.n} (${got}/${g.tgt} vitel) – -${gameVal} pont`;
        addLog(resultText);
      }
    }
  }

  // Következő osztó rotation
  const nextDealer=(state.dealerIdx+1)%3;
  // Játék vége: bármelyik játékos saját pontja eléri vagy meghaladja a 0-t
  const gameOver=ns.some(s=>s>=0);
  state={...state,scores:ns,cellar:newCellar,resultMsg:resultText,phase:'result',dealerIdx:nextDealer,gameOver:gameOver};
  after();
}

function _mizerFirstOrLast(finalTW,pl){
  // Mizer: a vitel nem lehet sem az első (trickNum===1), sem az utolsó (trickNum===10) menet
  const history=state.trickHistory||[];
  const myWins=history.filter(t=>t.winner===pl);
  if(myWins.length!==1)return true; // nem pontosan 1 vitel → eleve bukott más okból
  const winTrick=myWins[0].trickNum;
  const maxTrick=history.length>0?Math.max(...history.map(t=>t.trickNum)):10;
  return winTrick===1||winTrick===maxTrick; // első vagy utolsó → bukott
}

function _pikkoloValid(pl){
  // Pikkoló: 2 vitel, de nem egymás után
  const history=state.trickHistory||[];
  const myWins=history.filter(t=>t.winner===pl).map(t=>t.trickNum).sort((a,b)=>a-b);
  if(myWins.length!==2)return false;
  return myWins[1]-myWins[0]>1; // egymás utáni → érvénytelen
}

function _calcFinalScore(pl){
  const own=state.scores[pl];
  const cellarSum=state.cellar.filter(c=>c.to===pl).reduce((s,c)=>s+c.val,0);
  return own - cellarSum/100;
}
// Formázza a pontszámot: ha >= 0, kalap jel + szám
function _fmtScore(score){
  if(score>0) return '^'+score;
  if(score===0) return '^0';
  return ''+score;
}
// Rendezi a játékosokat végső pontszám szerint (csökkenő)
function _getRanking(){
  return [0,1,2].map(i=>({i,fs:_calcFinalScore(i),sc:state.scores[i]}))
    .sort((a,b)=>b.fs-a.fs);
}

// ═══ BOT AI MOTOR ════════════════════════════════════════════
// A bot a saját kezét ismeri + a játszott lapokat + a tromfot

function _botTick(){
  if(!isHost) return;
  const s=state;
  // Meghatározza, hogy melyik bot lép
  [1,2].forEach(pi=>{
    if(!botConfig[pi-1]) return;
    setTimeout(()=>_botAct(pi), 900 + Math.random()*600);
  });
}

function _botAct(pi){
  if(!isHost) return;
  const s=state;
  const hand=s.hands[pi];
  if(!hand||hand.length===0) return;

  if(s.phase==='bid'&&s.bidder===pi){
    _botBid(pi);
  } else if(s.phase==='selectGame'&&s.bidWinner===pi){
    _botPickGame(pi);
  } else if(s.phase==='discard'&&s.bidWinner===pi){
    _botDiscard(pi);
  } else if(s.phase==='play'&&s.curP===pi){
    _botPlay(pi);
  }
}

// ── Bot licit ───────────────────────────────────────────────
function _botBid(pi){
  const hand=state.hands[pi];
  const s=state;
  // Ha Játék-response módban vagyunk, bot mindig passzol
  if(s.jatekResponseMode){
    processBid(pi, null, false);
    return;
  }
  const bid=_botCalcBid(hand, s.highBid);
  // Bot csak +1-et emelhet normál licitben
  if(bid!==null&&bid>s.highBid+1){
    processBid(pi, s.highBid+1, false);
  } else {
    processBid(pi, bid, false);
  }
}

function _botCalcBid(hand, currentHigh){
  // ── Alapstatisztikák ────────────────────────────────────────
  const totalStr=hand.reduce((s,c)=>s+VR[c.v],0);
  const aces=hand.filter(c=>c.v==='Á').length;
  const kings=hand.filter(c=>c.v==='K').length;
  const highCards=hand.filter(c=>['K','Á'].includes(c.v)).length;

  // ── Színenkénti elemzés ─────────────────────────────────────
  // Csak azt a színt licitálja amiben TÉNYLEG erős!
  // Cél: 6 vitelt nyerni 10-ből, azzal a színnel mint tromf
  // Ehhez kb. 4+ lap kell abból a színből (hogy tromfként domináljon)
  // ÉS legalább 2 magas lap (K/Á) abból a színből VAGY összesen erős kéz
  const suitAnalysis={};
  SUITS.forEach(su=>{
    const cards=hand.filter(c=>c.s===su);
    const cnt=cards.length;
    const str=cards.reduce((s,c)=>s+VR[c.v],0);
    const hasAce=cards.some(c=>c.v==='Á');
    const hasKing=cards.some(c=>c.v==='K');
    const hasQueen=cards.some(c=>c.v==='F'); // Felső
    const highInSuit=cards.filter(c=>['K','Á'].includes(c.v)).length;
    // Kézminőség-pontszám: tromfszín dominanciája + ált. kézminőség
    // 6 vitelt csak akkor reális ha: tromfból 4+ lap ÉS összesített kézminőség erős
    const suitDominance=cnt*4 + str*0.6 + (hasAce?5:0) + (hasKing?3:0) + (hasQueen?1:0);
    // Becsült nyerhető vitelek ebből a színből tromfként
    // Durva becslés: (tromflapok száma) + (más színű magas lapok)
    const estTricksFromTrump=cnt + Math.floor((totalStr-str)/8);
    suitAnalysis[su]={cnt,str,hasAce,hasKing,highInSuit,suitDominance,estTricksFromTrump};
  });

  // Legjobb tromfszín: CSAK ha legalább 4 lapja van belőle
  const gameMapping={zold:2,sarga:3,piros:4,makk:5};
  let bestSuit=null, bestSuitScore=0;
  SUITS.forEach(su=>{
    const a=suitAnalysis[su];
    // Minimális feltétel: legalább 4 lap a tromfszínből
    if(a.cnt<4) return;
    // Ezen felül: legalább 1 magas lap (K vagy Á) a tromfszínből VAGY nagyon sok lap
    if(a.highInSuit===0&&a.cnt<5) return;
    if(a.suitDominance>bestSuitScore){
      bestSuitScore=a.suitDominance;
      bestSuit=su;
    }
  });
  const colorBid=bestSuit?gameMapping[bestSuit]:0;

  // Megbecsüljük hány vitelt nyerhetünk a legjobb tromfszínnel
  const estWins=bestSuit?suitAnalysis[bestSuit].estTricksFromTrump:0;

  // ── Különleges játékok ──────────────────────────────────────

  // BETLI: 0 vitelt kell nyerni – nagyon gyenge kéz kell
  // Feltétel: nincs Ász, nincs Király, és az összes lap gyenge
  // Fontos: ha van sok alacsony lap minden színből, az jó (nem szorítják be)
  const maxCardVal=Math.max(...hand.map(c=>VR[c.v]));
  const canBetli=(
    aces===0 && kings===0 &&
    maxCardVal<=4 && // legmagasabb lap max Ász (VR=4, ez az "A" értékű lap)
    totalStr<=16 &&
    currentHigh<6
  );

  // MIZER: pontosan 1 vitelt kell nyerni, NEM az első és NEM az utolsó menetben
  // Feltétel: nagyon kevés magas lap, pontosan kiszámítható 1 vitel
  // Ha van 1 Ász vagy 1 Király, az lehet a tervezett 1 vitel
  // De a többi lapnak NAGYON gyengének kell lennie
  const mizerHighOnly=hand.filter(c=>['K','Á'].includes(c.v));
  const mizerLowStr=hand.filter(c=>!['K','Á'].includes(c.v)).reduce((s,c)=>s+VR[c.v],0);
  const canMizer=(
    highCards<=1 && aces<=1 &&
    mizerLowStr<=12 && // a magas lapokon kívüli lapok nagyon gyengék
    totalStr<=22 &&
    currentHigh<7
  );

  // PIKKOLÓ: pontosan 2 vitelt kell nyerni, NEM egymás után
  // Feltétel: pontosan 2 erős lap (K/Á) más-más színből, a többi nagyon gyenge
  const pikkoloHighSuits=new Set(hand.filter(c=>['K','Á'].includes(c.v)).map(c=>c.s));
  const canPikkolo=(
    highCards===2 && pikkoloHighSuits.size===2 && // 2 magas lap, 2 különböző színből
    aces<=1 &&
    totalStr<=28 &&
    currentHigh<9
  );

  // SZANADU: 6 vitelt kell nyerni TROMF NÉLKÜL – nagyon erős kéz kell
  // Feltétel: min 3 Ász + min 6 magas lap + minden színből van magas lap
  const suitsWithHighCard=SUITS.filter(su=>hand.some(c=>c.s===su&&['K','Á'].includes(c.v))).length;
  const canSzanadu=(
    aces>=3 && highCards>=7 && totalStr>=40 &&
    suitsWithHighCard>=3 && // legalább 3 különböző színből van magas lap
    currentHigh<8
  );

  // PREFERANSZ: min 6 piros vitel kell, TROMF NINCS
  // Feltétel: min 7 piros lap, ebből min 4 magas (F/K/Á), erős piros összérték
  const pirosInHand=hand.filter(c=>c.s==='piros');
  const pirosStr=pirosInHand.reduce((s,c)=>s+VR[c.v],0);
  const pirosHighCards=pirosInHand.filter(c=>['F','K','Á'].includes(c.v)).length;
  const pirosAce=pirosInHand.some(c=>c.v==='Á');
  const canPreferansz=(
    pirosInHand.length>=7 && pirosHighCards>=4 &&
    pirosAce && // Piros Ász kötelező
    pirosStr>=35 &&
    currentHigh<10
  );

  // ── Döntés: a legjobb licitálható játék ────────────────────
  let targetBid=0;

  if(canPreferansz) targetBid=10;
  else if(canSzanadu) targetBid=8;
  else if(canPikkolo&&!canBetli&&!canMizer) targetBid=9; // pikkoló ha más nem megy
  else if(canBetli) targetBid=6;
  else if(canMizer) targetBid=7;
  else if(colorBid>0&&estWins>=6&&colorBid>currentHigh) targetBid=colorBid;
  else if(colorBid>0&&estWins>=5&&bestSuit&&suitAnalysis[bestSuit].cnt>=5&&colorBid>currentHigh) targetBid=colorBid;

  // ── Nehézség módosítók ──────────────────────────────────────
  if(botDifficulty==='easy'){
    if(Math.random()<0.3) return null; // 30% eséllyel passzol jó kézzel is
    if(targetBid>=7) targetBid=0; // könnyű bot soha nem megy Betlin felüli játékra
    if(targetBid>0&&Math.random()<0.2) return null; // extra bizonytalanság
  } else if(botDifficulty==='normal'){
    if(targetBid>=9) targetBid=0; // normál bot nem licitál pikkolót/preferanszt
    if(canSzanadu&&Math.random()<0.3) targetBid=0; // szanadu is kockázatos
  } else if(botDifficulty==='hard'){
    // Hard bot: teljes döntési képesség, de extra ellenőrzés
    if(targetBid===0&&bestSuit&&suitAnalysis[bestSuit].cnt>=5&&
       suitAnalysis[bestSuit].highInSuit>=2&&colorBid>currentHigh){
      targetBid=colorBid; // hard bot felismeri az erős 5-lapos színt is
    }
  }

  if(targetBid>0&&targetBid>currentHigh) return targetBid;
  return null;
}

// ── Bot játékválasztás ──────────────────────────────────────
function _botPickGame(pi){
  const hand=state.hands[pi]; // már tartalmazza a talont is
  const s=state;
  const totalStr=hand.reduce((sc,c)=>sc+VR[c.v],0);
  const aces=hand.filter(c=>c.v==='Á').length;
  const highCards=hand.filter(c=>['K','Á'].includes(c.v)).length;
  const maxCardVal=Math.max(...hand.map(c=>VR[c.v]));

  // Színenkénti elemzés (talon után)
  const gameMapping={zold:2,sarga:3,piros:4,makk:5};
  const suitData={};
  SUITS.forEach(su=>{
    const cards=hand.filter(c=>c.s===su);
    suitData[su]={
      cnt:cards.length,
      str:cards.reduce((sc,c)=>sc+VR[c.v],0),
      highInSuit:cards.filter(c=>['K','Á'].includes(c.v)).length,
      hasAce:cards.some(c=>c.v==='Á'),
    };
  });

  // Piros ellenőrzés (Preferansz)
  const pirosD=suitData['piros'];
  const pirosHighCards=hand.filter(c=>c.s==='piros'&&['F','K','Á'].includes(c.v)).length;
  const okPreferansz=pirosD.cnt>=7&&pirosHighCards>=4&&pirosD.hasAce&&pirosD.str>=35;

  // Szanadu
  const suitsWithHigh=SUITS.filter(su=>suitData[su].highInSuit>0).length;
  const okSzanadu=aces>=3&&highCards>=7&&totalStr>=40&&suitsWithHigh>=3;

  // Pikkoló
  const pikkoloHighSuits=new Set(hand.filter(c=>['K','Á'].includes(c.v)).map(c=>c.s));
  const okPikkolo=highCards===2&&pikkoloHighSuits.size===2&&totalStr<=30;

  // Betli
  const okBetli=aces===0&&hand.filter(c=>['K','Á'].includes(c.v)).length===0&&maxCardVal<=4&&totalStr<=16;

  // Mizer
  const mizerLowStr=hand.filter(c=>!['K','Á'].includes(c.v)).reduce((sc,c)=>sc+VR[c.v],0);
  const okMizer=highCards<=1&&aces<=1&&mizerLowStr<=14&&totalStr<=24;

  // Legjobb tromfszín (min 4 lap + 1 magas abból a színből)
  let bestColorSuit=null, bestColorScore=0;
  SUITS.forEach(su=>{
    const d=suitData[su];
    if(d.cnt<4) return;
    if(d.highInSuit===0&&d.cnt<5) return;
    const estWins=d.cnt+Math.floor((totalStr-d.str)/8);
    const score=d.cnt*4+d.str*0.6+(d.hasAce?5:0)+(d.highInSuit*3);
    if(estWins>=6&&score>bestColorScore){bestColorScore=score;bestColorSuit=su;}
  });

  // Kényszer minimum: legalább a highBid értékű játékot kell játszani
  const minId=s.highBid;

  // Válasszuk a legjobb megnyerhető játékot ami >= minId
  let chosen=null;
  const candidates=[];
  if(okPreferansz&&10>=minId) candidates.push({id:10,ok:true});
  if(okSzanadu&&8>=minId) candidates.push({id:8,ok:true});
  if(okPikkolo&&9>=minId) candidates.push({id:9,ok:true});
  if(okMizer&&7>=minId) candidates.push({id:7,ok:true});
  if(okBetli&&6>=minId) candidates.push({id:6,ok:true});
  if(bestColorSuit){
    const cid=gameMapping[bestColorSuit];
    if(cid>=minId) candidates.push({id:cid,suit:bestColorSuit,ok:true});
  }

  // A legjobb (legmagasabb értékű megnyerhető)
  if(candidates.length>0){
    candidates.sort((a,b)=>b.id-a.id);
    // Ha a kötelező minimum egy speciális játék (pl. Szanadu) de nem tudja, vegyük az alacsonyabbat
    chosen=GAMES.find(g=>g.id===candidates[0].id)||null;
  }

  // Ha nincs jó opció: kénytelen a minimum játékkal menni
  if(!chosen){
    chosen=GAMES.find(g=>g.id===minId)||GAMES.find(g=>g.id>=minId)||GAMES[0];
  }

  if(chosen) _doPickGame(chosen);
}

// ── Bot eldobás ──────────────────────────────────────────────
function _botDiscard(pi){
  const hand=state.hands[pi];
  const g=state.game;
  let toDiscard;

  if(g.tp==='betli'||g.tp==='mizer'){
    // Betli/Mizer: legmagasabb lapokat dobjuk el (ezek veszélyesek)
    toDiscard=[...hand].sort((a,b)=>VR[b.v]-VR[a.v]).slice(0,2).map(c=>c.id);
  } else if(g.tp==='preferansz'){
    // Preferansz: piros lapokat MINDIG tartsuk meg, gyenge nem-pirosat dobjuk
    const nonPiros=hand.filter(c=>c.s!=='piros').sort((a,b)=>VR[a.v]-VR[b.v]);
    const piros=hand.filter(c=>c.s==='piros').sort((a,b)=>VR[a.v]-VR[b.v]);
    const pool=[...nonPiros,...piros];
    toDiscard=pool.slice(0,2).map(c=>c.id);
  } else if(g.trump){
    // Színjáték: tromfot tartsuk meg, gyenge idegen színt dobjunk
    const nonTrump=hand.filter(c=>c.s!==g.trump);
    const trump=hand.filter(c=>c.s===g.trump);
    // Csoportosítjuk a nem-tromf lapokat szín szerint
    // Ha valamelyik színből csak 1-2 lap van + gyenge → azt dobjuk (blankot csinálunk)
    const suitGroups={};
    nonTrump.forEach(c=>{ if(!suitGroups[c.s])suitGroups[c.s]=[]; suitGroups[c.s].push(c); });
    // Legkisebb összértékű csoport (preferáljuk azt dobni teljesen)
    const sortedGroups=Object.values(suitGroups).sort((a,b)=>{
      const aStr=a.reduce((s,c)=>s+VR[c.v],0)/a.length;
      const bStr=b.reduce((s,c)=>s+VR[c.v],0)/b.length;
      return aStr-bStr; // leggyengébb előre
    });
    const pool=[];
    sortedGroups.forEach(grp=>pool.push(...grp.sort((a,b)=>VR[a.v]-VR[b.v])));
    pool.push(...trump.sort((a,b)=>VR[a.v]-VR[b.v])); // tromf utoljára
    toDiscard=pool.slice(0,2).map(c=>c.id);
  } else {
    // Szanadu/egyéb: leggyengébb lapokat dobjuk
    toDiscard=[...hand].sort((a,b)=>VR[a.v]-VR[b.v]).slice(0,2).map(c=>c.id);
  }

  _doDiscard(toDiscard[0]);
  setTimeout(()=>{ if(state.phase==='discard'&&state.bidWinner===pi) _doDiscard(toDiscard[1]); },600);
}

// ── Bot kijátszás ────────────────────────────────────────────
function _botPlay(pi){
  const s=state;
  const hand=s.hands[pi];
  const trick=s.trick;
  const g=s.game;
  if(!g||hand.length===0) return;

  let card=null;

  if(g.tp==='betli'){
    card=_botPlayBetli(pi,hand,trick,g);
  } else if(g.tp==='mizer'){
    card=_botPlayMizer(pi,hand,trick,g);
  } else if(g.tp==='pikkolo'){
    card=_botPlayPikkolo(pi,hand,trick,g,s);
  } else if(g.tp==='passround'){
    card=_botPlayPassround(pi,hand,trick,g);
  } else {
    // Színjáték, Szanadu, Preferansz
    const isBidWinner=(s.bidWinner===pi);
    card=_botPlayColor(pi,hand,trick,g,isBidWinner,s);
  }

  if(!card) card=hand[0]; // fallback
  _doPlay(pi,card);
}

// Érvényes lapok szűrése (kötelező szín/tromf)
function _botValidCards(pi,hand,trick,g){
  if(trick.length===0) return hand;
  const lead=trick[0].card.s;
  const hasSuit=hand.some(c=>c.s===lead);
  if(hasSuit) return hand.filter(c=>c.s===lead);
  if(g&&g.trump){
    const hasTrump=hand.some(c=>c.s===g.trump);
    if(hasTrump) return hand.filter(c=>c.s===g.trump);
  }
  return hand;
}

// ── Betli stratégia: ne vigyen el semmit ──
function _botPlayBetli(pi,hand,trick,g){
  const valid=_botValidCards(pi,hand,trick,g);
  if(trick.length===0){
    // Legkisebb lapot játssza ki
    return valid.sort((a,b)=>VR[a.v]-VR[b.v])[0];
  }
  const lead=trick[0].card.s;
  const currentWin=_trickCurrentBest(trick,null);
  // Kijátsszuk a legkisebbet ami nem viszi el a menetet
  const losers=valid.filter(c=>{
    if(c.s!==lead) return true; // nem vezető szín = biztosan nem visz
    return VR[c.v]<VR[currentWin.v];
  }).sort((a,b)=>VR[b.v]-VR[a.v]); // legmagasabb vesztessel
  return losers[0]||valid.sort((a,b)=>VR[a.v]-VR[b.v])[0];
}

// ── Mizer stratégia: pontosan 1 vitel, nem első/utolsó ──
function _botPlayMizer(pi,hand,trick,g){
  const s=state;
  const myTW=s.tw[pi];
  const valid=_botValidCards(pi,hand,trick,g);
  const tricksDone=s.tw[0]+s.tw[1]+s.tw[2];
  const tricksLeft=10-tricksDone-(trick.length>0?1:0);

  if(myTW===0&&trick.length===0&&tricksLeft>1){
    // Még nem vitt, nem utolsó menet → megpróbálja elvinni (de nem elsőként sem)
    if(tricksDone>0&&tricksDone<9){
      return valid.sort((a,b)=>VR[b.v]-VR[a.v])[0]; // legmagasabb
    }
    return valid.sort((a,b)=>VR[a.v]-VR[b.v])[0];
  }
  if(myTW>=1){
    // Már megvan az 1 vitel → veszíteni kell
    return _botPlayBetli(pi,hand,trick,g);
  }
  return valid.sort((a,b)=>VR[a.v]-VR[b.v])[0];
}

// ── Pikkoló: pontosan 2 vitel, nem egymás után ──
function _botPlayPikkolo(pi,hand,trick,g,s){
  const myTW=s.tw[pi];
  const valid=_botValidCards(pi,hand,trick,g);
  const tricksDone=s.tw[0]+s.tw[1]+s.tw[2];
  const lastWasMe=(s.lastTrickWinner===pi);

  if(myTW<2&&!lastWasMe){
    // Próbáljuk elvinni
    return valid.sort((a,b)=>VR[b.v]-VR[a.v])[0];
  }
  // Túl sok vitel vagy utóbbi menet a miénk → veszíteni
  return _botPlayBetli(pi,hand,trick,g);
}

// ── Körpassz ──
function _botPlayPassround(pi,hand,trick,g){
  const valid=_botValidCards(pi,hand,trick,g);
  // Körpasszban minél kevesebbet vinni
  return _botPlayBetli(pi,hand,trick,g);
}

// ── Színjáték / Szanadu / Preferansz stratégia ──
function _botPlayColor(pi,hand,trick,g,isBidWinner,s){
  const valid=_botValidCards(pi,hand,trick,g);
  const trump=g.trump;
  const isPref=(g.tp==='preferansz');
  const isSzanadu=(g.tp==='szanadu');
  const bw=s.bidWinner;
  const myTW=s.tw[pi];
  const totalTW=s.tw[0]+s.tw[1]+s.tw[2];
  const tricksLeft=10-totalTW-(trick.length>0?1:0);
  const opp=[0,1,2].filter(i=>i!==bw);
  const partner=opp.find(i=>i!==pi)||opp[0];

  // ══ LICITNYERTES stratégia ═══════════════════════════════
  if(isBidWinner){
    if(trick.length===0){
      // Preferansz: mindig a legerősebb pirosat
      if(isPref){
        const piros=hand.filter(c=>c.s==='piros').sort((a,b)=>VR[b.v]-VR[a.v]);
        if(piros.length>0) return piros[0];
        return valid.sort((a,b)=>VR[b.v]-VR[a.v])[0];
      }
      // Szanadu: tromf nincs, a legerősebb lappal kezd
      if(isSzanadu) return valid.sort((a,b)=>VR[b.v]-VR[a.v])[0];
      // Színjáték: ha sok tromf van (4+), húzza ki az ellenfél tromfjait
      if(trump){
        const myTrump=hand.filter(c=>c.s===trump);
        const oppTrumpEst=4-myTrump.length; // becsült ellenfél tromf
        if(myTrump.length>=3&&oppTrumpEst>0&&myTW<g.tgt){
          return myTrump.sort((a,b)=>VR[b.v]-VR[a.v])[0];
        }
      }
      // Egyébként: legerősebb nem-tromf vezető szín
      const nonTrump=hand.filter(c=>c.s!==trump);
      if(nonTrump.length>0){
        // Amelyik színből a legtöbb lapunk van (hogy kitisztítsuk)
        const suitGroups={};
        nonTrump.forEach(c=>{ if(!suitGroups[c.s])suitGroups[c.s]=[]; suitGroups[c.s].push(c); });
        const bestGroup=Object.values(suitGroups).sort((a,b)=>{
          const aStr=a.reduce((s,c)=>s+VR[c.v],0);
          const bStr=b.reduce((s,c)=>s+VR[c.v],0);
          return bStr-aStr;
        })[0];
        if(bestGroup) return bestGroup.sort((a,b)=>VR[b.v]-VR[a.v])[0];
      }
      return hand.sort((a,b)=>VR[b.v]-VR[a.v])[0];
    }

    // Rádobás
    const lead=trick[0].card.s;
    const currentBest=_trickCurrentBest(trick,trump);
    const winners=valid.filter(c=>_cardBeats(c,currentBest.card,lead,trump));

    if(isPref){
      if(lead==='piros'&&winners.length>0) return winners.sort((a,b)=>VR[a.v]-VR[b.v])[0];
      if(winners.length>0) return winners.sort((a,b)=>VR[a.v]-VR[b.v])[0];
      // Nem tud nyerni: a legkisebb lapot dobja
      return valid.sort((a,b)=>VR[a.v]-VR[b.v])[0];
    }
    // Ha nyerhetünk: legkisebb nyerővel nyerünk (tromf-takarékos)
    if(winners.length>0){
      // Előnyben adjuk a nem-tromf nyerőket
      const nonTrumpWin=winners.filter(c=>c.s!==trump);
      if(nonTrumpWin.length>0) return nonTrumpWin.sort((a,b)=>VR[a.v]-VR[b.v])[0];
      return winners.sort((a,b)=>VR[a.v]-VR[b.v])[0];
    }
    // Nem nyerhet: legkisebb lapot dobja (tromfot menti ha lehet)
    const nonTrumpLose=valid.filter(c=>c.s!==trump);
    if(nonTrumpLose.length>0) return nonTrumpLose.sort((a,b)=>VR[a.v]-VR[b.v])[0];
    return valid.sort((a,b)=>VR[a.v]-VR[b.v])[0];
  }

  // ══ ELLENFÉL stratégia ═══════════════════════════════════
  if(isPref){
    // Aláhúzás: megakadályozni a 6 piros vitelt
    if(trick.length===0){
      const piros=hand.filter(c=>c.s==='piros').sort((a,b)=>VR[b.v]-VR[a.v]);
      if(piros.length>0) return piros[0];
      // Nincs piros: legkisebb lapot
      return valid.sort((a,b)=>VR[a.v]-VR[b.v])[0];
    }
    const lead=trick[0].card.s;
    const currentBest=_trickCurrentBest(trick,null);
    const partnerLeads=(currentBest.pl===partner&&partner!==bw);
    if(partnerLeads){
      return valid.sort((a,b)=>VR[a.v]-VR[b.v])[0]; // partner vezet, legkisebbet dobjuk
    }
    const winners=valid.filter(c=>_cardBeats(c,currentBest.card,lead,null));
    if(winners.length>0) return winners.sort((a,b)=>VR[a.v]-VR[b.v])[0];
    return valid.sort((a,b)=>VR[a.v]-VR[b.v])[0];
  }

  // ══ Normál színjáték ellenfél ════════════════════════════
  if(trick.length===0){
    // Mi kezdünk ellenfélként: olyan színt játsszunk amiből sok van (blokkolás)
    const nonTrump=hand.filter(c=>c.s!==trump);
    if(nonTrump.length>0){
      // Legjobb nem-tromf szín amit van esélyünk nyerni
      const suitGroups={};
      nonTrump.forEach(c=>{ if(!suitGroups[c.s])suitGroups[c.s]=[]; suitGroups[c.s].push(c); });
      const bestGroup=Object.values(suitGroups).sort((a,b)=>{
        const aStr=a.reduce((s,c)=>s+VR[c.v],0);
        const bStr=b.reduce((s,c)=>s+VR[c.v],0);
        return bStr-aStr;
      })[0];
      if(bestGroup) return bestGroup.sort((a,b)=>VR[b.v]-VR[a.v])[0];
    }
    return valid[0];
  }

  const lead=trick[0].card.s;
  const currentBest=_trickCurrentBest(trick,trump);
  const bwLeads=(currentBest.pl===bw);
  const partnerLeads=(currentBest.pl===partner&&partner!==bw);

  // Ha partnerünk vezet → legkisebbet dobjuk (ne zavarjuk)
  if(partnerLeads&&trick.length<3){
    const nonTrump=valid.filter(c=>c.s!==trump);
    if(nonTrump.length>0) return nonTrump.sort((a,b)=>VR[a.v]-VR[b.v])[0];
    return valid.sort((a,b)=>VR[a.v]-VR[b.v])[0];
  }

  // Ha a licitnyertes vezet → próbáljuk felülütni
  const winners=valid.filter(c=>_cardBeats(c,currentBest.card,lead,trump));
  if(winners.length>0){
    // Legkisebb nyerővel nyerünk (tromf-takarékos)
    const nonTrumpWin=winners.filter(c=>c.s!==trump);
    if(nonTrumpWin.length>0) return nonTrumpWin.sort((a,b)=>VR[a.v]-VR[b.v])[0];
    // Csak tromffal tudunk nyerni: csak ha megéri (pl. utolsó 3 menetben)
    if(tricksLeft<=3||bwLeads) return winners.sort((a,b)=>VR[a.v]-VR[b.v])[0];
  }
  // Nem tudunk nyerni: legkisebb, de tromfot mentsük
  const nonTrumpLose=valid.filter(c=>c.s!==trump);
  if(nonTrumpLose.length>0) return nonTrumpLose.sort((a,b)=>VR[a.v]-VR[b.v])[0];
  return valid.sort((a,b)=>VR[a.v]-VR[b.v])[0];
}


function _trickCurrentBest(trick,trump){
  if(!trick||trick.length===0) return null;
  const lead=trick[0].card.s;
  return trick.reduce((best,cur)=>{
    if(_cardBeats(cur.card,best.card,lead,trump)) return cur;
    return best;
  });
}

function _cardBeats(card,against,lead,trump){
  if(trump){
    const ca=(card.s===trump?200:card.s===lead?10:0)+VR[card.v];
    const aa=(against.s===trump?200:against.s===lead?10:0)+VR[against.v];
    return ca>aa;
  }
  const ca=(card.s===lead?10:0)+VR[card.v];
  const aa=(against.s===lead?10:0)+VR[against.v];
  return ca>aa;
}

// Botok triggerelése after() után
function _scheduleBots(){
  if(!isHost) return;
  const s=state;
  [1,2].forEach(pi=>{
    if(!botConfig[pi-1]) return;
    const needsAct=
      (s.phase==='bid'&&s.bidder===pi)||
      (s.phase==='selectGame'&&s.bidWinner===pi)||
      (s.phase==='discard'&&s.bidWinner===pi)||
      (s.phase==='play'&&s.curP===pi);
    if(needsAct) setTimeout(()=>_botAct(pi), 850+Math.random()*500);
  });
}

function _mkDeck(){return SUITS.flatMap(s=>VALS.map(v=>({s,v,id:`${s}_${v}`})));}
function _shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

// ═══ HELYI AKCIÓK ════════════════════════════════════════════
function myBid(amount){
  if(state.phase!=='bid'||state.bidder!==myIndex)return;
  sendAction({kind:'bid',amount,isJatek:false});
}
function myJatekBid(amount){
  if(state.phase!=='bid'||state.bidder!==myIndex)return;
  sendAction({kind:'bid',amount,isJatek:true});
}
function myPickGame(g){
  if(state.phase!=='selectGame'||state.bidWinner!==myIndex)return;
  sendAction({kind:'pickGame',gameId:g.id});
}
function myEarlyBid(g){
  if(state.phase!=='bid'||state.bidder!==myIndex)return;
  sendAction({kind:'earlyBid',gameId:g.id});
}
function myDiscard(cardId){
  if(state.phase!=='discard'||state.bidWinner!==myIndex)return;
  if(state.liftedCard===cardId){
    state.liftedCard=null; sendAction({kind:'discard',cardId});
  } else {
    state={...state,liftedCard:cardId}; render();
  }
}
function myPlay(card){
  if(state.phase!=='play'||state.curP!==myIndex)return;
  if(!_isValidPlay(myIndex,card)){
    const g=state.game;
    const lead=state.trick[0]?.card.s;
    const hasSuit=state.hands[myIndex].some(c=>c.s===lead);
    if(hasSuit) state={...state,msg:`⚠️ Kötelező ${SI[lead]?.n||lead} színre menni!`};
    else state={...state,msg:'⚠️ Kötelező tromfot rakni, ha van!'};
    render(); return;
  }
  if(state.liftedCard===card.id){
    state.liftedCard=null; sendAction({kind:'play',cardId:card.id});
  } else {
    state={...state,liftedCard:card.id}; render();
  }
}

function _numPositions(n,W,H){
  const lx=W*0.28,rx=W*0.72,cx=W/2;
  const t1=H*0.22,t2=H*0.36,mid=H*0.5,b2=H*0.64,b1=H*0.78;
  const positions={
    7:[[lx,t1,0],[rx,t1,0],[lx,mid,0],[rx,mid,0],[cx,t2,0],[lx,b1,1],[rx,b1,1]],
    8:[[lx,t1,0],[rx,t1,0],[lx,mid,0],[rx,mid,0],[cx,t2,0],[lx,b1,1],[rx,b1,1],[cx,b2,1]],
    9:[[lx,t1,0],[rx,t1,0],[lx,t2,0],[rx,t2,0],[cx,mid,0],[lx,b2,1],[rx,b2,1],[lx,b1,1],[rx,b1,1]],
    10:[[lx,t1,0],[rx,t1,0],[lx,t2,0],[rx,t2,0],[cx,t2*0.7+mid*0.3,0],[lx,b2,1],[rx,b2,1],[lx,b1,1],[rx,b1,1],[cx,b2*0.7+t2*0.3+H*0.06,1]]
  };
  return positions[n]||[[cx,mid,0]];
}

function buildCardSVG(card,lifted,W,H){
  const svg=mkS('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
  const si=SI[card.s]||SI.piros;
  const R=5;
  const isFigure=['A','F','K','Á'].includes(card.v);
  const isNumber=['7','8','9','10'].includes(card.v);
  const dispV=displayVal(card.v);
  const fontSize=dispV.length>2?7:10;
  // Pergamen háttér
  svg.appendChild(mkS('rect',{x:1,y:1,width:W-2,height:H-2,rx:R,ry:R,fill:'#fcf5e5',stroke:lifted?'#ffee58':si.col,'stroke-width':lifted?3:1.8}));
  svg.appendChild(mkS('rect',{x:3,y:3,width:W-6,height:H-6,rx:R-1,ry:R-1,fill:'none',stroke:si.col,opacity:'0.18','stroke-width':0.8}));
  if(lifted){svg.appendChild(mkS('rect',{x:2.5,y:2.5,width:W-5,height:H-5,rx:R-1,ry:R-1,fill:'none',stroke:'rgba(255,238,88,0.45)','stroke-width':1.2}));}
  // Bal felső sarok
  const vlbl=mkS('text',{x:3.5,y:13,'font-size':fontSize,'font-weight':'bold',fill:si.col,'font-family':'Georgia,serif'});vlbl.textContent=dispV;svg.appendChild(vlbl);
  drawSuit(svg,card.s,W-8,9,9);
  // Jobb alsó sarok (tükör)
  const g2=mkS('g',{transform:`rotate(180,${W/2},${H/2})`});
  const vlbl2=mkS('text',{x:3.5,y:13,'font-size':fontSize,'font-weight':'bold',fill:si.col,'font-family':'Georgia,serif'});vlbl2.textContent=dispV;g2.appendChild(vlbl2);
  drawSuit(g2,card.s,W-8,9,9);
  svg.appendChild(g2);
  // Kártya közepe
  if(isFigure&&card.v!=='Á'){
    drawSuit(svg,card.s,W/2,H*0.22,Math.min(W,H)*0.22);
    const gSym=mkS('g',{transform:`rotate(180,${W/2},${H/2})`});
    drawSuit(gSym,card.s,W/2,H*0.22,Math.min(W,H)*0.22);
    svg.appendChild(gSym);
    drawFigure(svg,card.v,card.s,W/2,H/2,W,H);
  } else if(card.v==='Á'){
    drawSuit(svg,card.s,W/2,H/2,Math.min(W,H)*0.62);
    svg.appendChild(mkS('circle',{cx:W/2,cy:H/2,r:Math.min(W,H)*0.35,fill:'none',stroke:si.col,opacity:'0.12','stroke-width':1.2,'stroke-dasharray':'3,3'}));
  } else if(isNumber){
    const n=parseInt(card.v);
    const positions=_numPositions(n,W,H);
    const symSize=Math.min(W,H)*0.2;
    positions.forEach(([px,py,flipped])=>{
      if(flipped){const gf=mkS('g',{transform:`rotate(180,${px},${py})`});drawSuit(gf,card.s,px,py,symSize);svg.appendChild(gf);}
      else{drawSuit(svg,card.s,px,py,symSize);}
    });
  }
  return svg;
}

function buildBackSVG(W,H){
  const svg=mkS('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
  svg.appendChild(mkS('rect',{x:1,y:1,width:W-2,height:H-2,rx:4,ry:4,fill:'#1565c0',stroke:'#0d47a1','stroke-width':1.5}));
  svg.appendChild(mkS('rect',{x:3,y:3,width:W-6,height:H-6,rx:3,ry:3,fill:'none',stroke:'rgba(255,255,255,0.25)','stroke-width':1}));
  const cx=W/2,cy=H/2;
  svg.appendChild(mkS('circle',{cx,cy,r:Math.min(W,H)*0.22,fill:'rgba(255,255,255,0.07)',stroke:'rgba(255,255,255,0.18)','stroke-width':1}));
  const t=mkS('text',{x:cx,y:cy+4,'font-size':Math.min(W,H)*0.28,'font-weight':'bold',fill:'rgba(255,255,255,0.25)','text-anchor':'middle','font-family':'Georgia,serif'});t.textContent='P';svg.appendChild(t);
  return svg;
}

function renderCard(card,onClick,lifted,W=54,H=84){
  const w=document.createElement('div'); w.style.cssText='display:inline-block;flex-shrink:0;cursor:'+(onClick?'pointer':'default')+';';

// ═══ RENDER KERETRENDSZER ════════════════════════════════════
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style')Object.assign(e.style,v);else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);else e.setAttribute(k,v);});
  if(children)children.forEach(c=>{if(c!=null)e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}
function div(s,ch){return el('div',{style:s},ch);}
function btn(s,cb,ch){return el('button',{style:{cursor:'pointer',...s},onClick:cb},ch);}
function inp(ph,val,onCh){const i=el('input',{type:'text',placeholder:ph});i.value=val||'';i.addEventListener('input',e=>onCh(e.target.value));return i;}

function render(){
  const app=document.getElementById('app'); app.innerHTML='';
  if(netPhase==='lobby')      {app.appendChild(rLobby());}
  else if(netPhase==='hosting')    {app.appendChild(rHosting());}
  else if(netPhase==='ready')      {app.appendChild(rHosting());}
  else if(netPhase==='joining')    {app.appendChild(rJoining());}
  else if(netPhase==='waiting')    {app.appendChild(rWaiting());}
  else if(netPhase==='disconnected'){app.appendChild(rDisconn());}
  else {app.appendChild(rGame());}
  // Szabályzat overlay – mindig a tetején, bármely nézetből elérhető
  if(showRules){app.appendChild(rRules());}
}

      div({fontSize:'12px',color:'#81c784',marginBottom:'10px',textAlign:'center',letterSpacing:'1px'},['JÁTÉKOSOK']),
      ...[0,1,2].map(i=>div({display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',borderBottom:i<2?'1px solid rgba(255,255,255,0.08)':'none'},[
        div({width:'24px',height:'24px',borderRadius:'50%',
          background:i===0?'#4caf50':botConfig[i-1]?'#7b1fa2':i<joinedCount+1?'#4caf50':'rgba(255,255,255,0.1)',
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px'},
          [i===0?'✓':botConfig[i-1]?'🤖':i<joinedCount+1?'✓':'○']),
        div({fontSize:'13px',flex:'1',
          color:i===0?'white':botConfig[i-1]?'#ce93d8':i<joinedCount+1?'white':'rgba(255,255,255,0.3)'},
          [i===0?pNames[0]+' (Te)':botConfig[i-1]?pNames[i]+' 🤖':pNames[i]||`Vendég ${i}`]),
        i>0&&!botConfig[i-1]&&pConns[i]===null&&(joinedCount<2)?btn(
          {background:'rgba(123,31,162,0.3)',border:'1px solid rgba(123,31,162,0.5)',color:'#ce93d8',
           borderRadius:'6px',padding:'3px 8px',fontSize:'10px'},
          ()=>{
            botConfig[i-1]=true;
            pNames[i]=['Koppány bot','Béla bot'][i-1];
            joinedCount++;
            if(joinedCount>=2)netPhase='ready';
            render();
          },['+Bot']
        ):null,
      ])),
    ]),
    joinedCount===2
      ? btn({background:'#4caf50',color:'white',border:'none',borderRadius:'50px',padding:'14px 40px',fontSize:'17px',fontWeight:'bold',boxShadow:'0 4px 20px rgba(76,175,80,0.5)',marginTop:'8px'},
          ()=>{netPhase='playing';startRound();},['▶ Játék indítása!'])
      : div({fontSize:'12px',color:'#a5d6a7',textAlign:'center'},[`Még ${2-joinedCount} játékos hiányzik...`]),
    btn({background:'none',border:'none',color:'rgba(255,255,255,0.3)',fontSize:'12px',marginTop:'8px'},
      ()=>{netPhase='lobby';joinedCount=0;pConns=[null,null,null];if(peer){peer.destroy();peer=null;}render();},[' ← Vissza']),
  ]);
}
