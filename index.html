// ═══ FŐ JÁTÉK NÉZET ═════════════════════════════════════════
function rGame(){
  const s=state;
  const showTrick=['play','between','evaluating'].includes(s.phase);
  const myHand=SUITS.flatMap(su=>s.hands[myIndex].filter(c=>c.s===su).sort((a,b)=>VR[a.v]-VR[b.v]));
  const others=[0,1,2].filter(i=>i!==myIndex);
  const isMyTurn=(s.phase==='play'&&s.curP===myIndex)
    ||(s.phase==='bid'&&s.bidder===myIndex)
    ||(s.phase==='discard'&&s.bidWinner===myIndex)
    ||(s.phase==='selectGame'&&s.bidWinner===myIndex);

  const children=[];

  // FEJLÉC – pontszámok
  children.push(div({
    background:'rgba(0,0,0,0.6)',padding:'6px 10px',
    display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:'0',
    borderBottom:'1px solid rgba(255,255,255,0.08)'
  },[
    div({display:'flex',alignItems:'center',gap:'6px'},[
      div({fontSize:'9px',color:isMyTurn?'#ffee58':'#81c784'},[isMyTurn?'🎯 Te jössz!':s.game?s.game.n:'Preferansz']),
      btn({background:'none',border:'none',color:'rgba(165,214,167,0.5)',fontSize:'11px',padding:'2px 6px',cursor:'pointer'},
        ()=>{showRules=true;render();},['📖']),
    ]),
    div({display:'flex',gap:'10px'},
      [0,1,2].map(i=>{
        const fs=_calcFinalScore(i);
        const sc=s.scores[i];
        const inKalap=sc>=0;
        return div({textAlign:'center'},[
          div({fontSize:'8px',color:i===myIndex?'#ffcc02':'#81c784'},[pNames[i].substring(0,6)+(i===myIndex?'★':'')]),
          div({fontSize:'14px',fontWeight:'bold',color:inKalap?'#ffee58':'white'},[_fmtScore(sc)]),
          div({fontSize:'8px',color:'rgba(255,255,255,0.4)'},[fs.toFixed(1)]),
        ]);
      })
    ),
  ]));

  // MÁS JÁTÉKOSOK KEZEI
  children.push(div({
    display:'flex',justifyContent:'space-around',padding:'6px 10px 4px',gap:'6px',flexShrink:'0'
  },
    others.map(pi=>div({flex:'1',textAlign:'center'},[
      div({fontSize:'9px',color:'#a5d6a7',marginBottom:'3px'},[
        pNames[pi]+(showTrick&&s.curP===pi?' 🎯':'')+(s.bidWinner===pi?' 👑':'')+' · '+s.tw[pi]+'v'
      ]),
      div({display:'flex',justifyContent:'center',gap:'1px',flexWrap:'wrap'},
        s.hands[pi].map(()=>renderBack(20,30))
      ),
    ]))
  ));

  // TALON
  if(s.showTalon&&s.talon.length>0){
    children.push(div({
      textAlign:'center',padding:'5px 0',
      borderTop:'1px solid rgba(255,255,255,0.08)',
      borderBottom:'1px solid rgba(255,255,255,0.08)',flexShrink:'0'
    },[
      div({fontSize:'9px',color:'#ffcc02',marginBottom:'5px'},['— Talon (mindenki látja) —']),
      div({display:'flex',justifyContent:'center',gap:'10px'},
        s.talon.map(c=>renderCard(c,null,false,40,62))),
    ]));
  }

  // ASZTAL (aktuális menet)
  if(showTrick){
    children.push(div({
      margin:'4px 8px',background:'rgba(0,0,0,0.25)',borderRadius:'10px',padding:'5px 8px',flexShrink:'0'
    },[
      div({fontSize:'9px',color:'#a5d6a7',marginBottom:'3px',display:'flex',justifyContent:'space-between'},[
        el('span',{},['Menet '+(Math.min(10,s.tw[0]+s.tw[1]+s.tw[2]+s.trick.length))+'/10']),
        s.game&&s.game.trump?el('span',{style:{color:SI[s.game.trump]?.col||'#fff'}},['🃏 Tromf: '+SI[s.game.trump]?.n]):null,
      ]),
      div({display:'flex',justifyContent:'center',gap:'12px',minHeight:'68px',alignItems:'center'},
        s.trick.length===0
          ?[div({color:'rgba(255,255,255,0.2)',fontSize:'11px'},['— asztal üres —'])]
          :s.trick.map(t=>div({textAlign:'center'},[
            div({fontSize:'8px',color:t.pl===myIndex?'#ffcc02':'#a5d6a7',marginBottom:'2px'},[
              pNames[t.pl]+(t.pl===myIndex?' (Te)':'')
            ]),
            renderCard(t.card,null,false,40,62),
          ]))
      ),
    ]));
  }

  // ÜZENET BAR
  children.push(div({
    background:isMyTurn?'rgba(249,168,37,0.15)':'rgba(0,0,0,0.2)',
    margin:'3px 8px',borderRadius:'7px',padding:'6px 12px',
    fontSize:'12px',textAlign:'center',
    color:isMyTurn?'#ffee58':'#fff9c4',
    minHeight:'30px',display:'flex',alignItems:'center',justifyContent:'center',
    lineHeight:'1.4',flexShrink:'0',
    border:isMyTurn?'1px solid rgba(249,168,37,0.4)':'none'
  },[s.msg||'...']));

  // JÁTÉK BADGE
  if(s.game&&showTrick){
    children.push(div({textAlign:'center',margin:'2px 0',flexShrink:'0'},[
      el('span',{style:{
        background:'rgba(249,168,37,0.1)',border:'1px solid rgba(249,168,37,0.25)',
        borderRadius:'20px',padding:'2px 10px',fontSize:'10px',color:'#ffcc02'
      }},[
        s.game.n+(s.game.trump?' · Tromf: '+SI[s.game.trump].n:' · Nincs tromf')
        +(s.game.tp==='preferansz'?' · Cél: min. 6 PIROS vitel · 2. lapot tesz':' · Cél: '+s.game.tgt)
        +(s.bidWinner!==null?' · '+pNames[s.bidWinner]:'')
        +(s.game.earlyBid?' · DUPLA':'')
      ])
    ]));
  }

  // ═══ AKCIÓ GOMBOK ════════════════════════════════════════

  // LICITÁLÁS
  if(s.phase==='bid'&&s.bidder===myIndex){
    const inJatekResponse=s.jatekResponseMode||false;
    children.push(div({padding:'5px 8px',flexShrink:'0'},[
      div({fontSize:'10px',color:inJatekResponse?'#ffcc02':'#a5d6a7',textAlign:'center',marginBottom:'5px'},[
        inJatekResponse
          ? `🎯 JÁTÉK elhangzott! Csak nagyobb Játékkal szólhatsz bele:`
          : (s.highBid?`Jelenlegi licit: ${s.highBid} – ${GAMES.find(g=>g.id>=s.highBid)?.n}`:'Nyitó licit')
      ]),

      // Ha jatekResponseMode: csak nagyobb Játék gombok + Passz
      inJatekResponse
        ? div({marginBottom:'5px'},[
            div({display:'flex',flexWrap:'wrap',gap:'3px',justifyContent:'center',marginBottom:'5px'},
              GAMES.filter(g=>g.id>s.highBid+1).map(g=>btn(
                {background:'rgba(249,168,37,0.25)',border:'2px solid rgba(249,168,37,0.6)',
                 color:'#ffcc02',borderRadius:'7px',padding:'7px 10px',fontSize:'12px',fontWeight:'bold'},
                ()=>{jatekModeActive=false;myJatekBid(g.id);},[`🎯 ${g.id}·${g.n}`]
              ))
            ),
          ])
        : div({},[
            // ── Normál +1 licit gomb ──
            s.highBid<10
              ? div({marginBottom:'5px'},[
                  btn({
                    width:'100%',
                    background:'rgba(255,255,255,0.13)',border:'1px solid rgba(255,255,255,0.3)',
                    color:'white',borderRadius:'8px',padding:'9px',fontSize:'13px',fontWeight:'bold'
                  },()=>myBid(s.highBid+1),[`▲ ${s.highBid+1} – ${GAMES.find(g=>g.id===s.highBid+1)?.n||'?'} (+1)`])
                ])
              : null,

            // ── Játék gomb + ugró licit panel ──
            s.highBid<9
              ? div({marginBottom:'5px'},[
                  div({fontSize:'9px',color:'#ffcc02',textAlign:'center',marginBottom:'4px',
                       background:'rgba(249,168,37,0.08)',borderRadius:'6px',padding:'4px 8px',
                       border:'1px solid rgba(249,168,37,0.2)'},
                    ['🎯 JÁTÉK gomb – ha ugrani akarsz (talon rejtett, pontok duplán!)']),
                  btn({
                    width:'100%',
                    background:jatekModeActive?'rgba(249,168,37,0.35)':'rgba(249,168,37,0.1)',
                    border:jatekModeActive?'2px solid #f9a825':'1px solid rgba(249,168,37,0.4)',
                    color:'#ffcc02',borderRadius:'8px',padding:'8px',fontSize:'13px',fontWeight:'bold',
                    marginBottom:'5px'
                  },()=>{jatekModeActive=!jatekModeActive;render();},[
                    jatekModeActive?'🎯 JÁTÉK MÓD AKTÍV – válassz játékot!':'🎯 Játék (ugró licit aktiválása)'
                  ]),
                  jatekModeActive
                    ? div({display:'flex',flexWrap:'wrap',gap:'3px',justifyContent:'center'},
                        GAMES.filter(g=>g.id>s.highBid+1).map(g=>btn(
                          {background:'rgba(249,168,37,0.2)',border:'1px solid rgba(249,168,37,0.5)',
                           color:'#ffcc02',borderRadius:'7px',padding:'6px 9px',fontSize:'11px',fontWeight:'bold'},
                          ()=>{jatekModeActive=false;myJatekBid(g.id);},[`${g.id}·${g.n}`]
                        ))
                      )
                    : null,
                ])
              : null,

            // Korai játék gomb (csak ha még senki nem mondott rendes licitet)
            s.highBid===0?div({marginBottom:'4px'},[
              div({fontSize:'9px',color:'#81c784',textAlign:'center',marginBottom:'3px'},['— vagy Korai Játék (dupla érték, talon nélkül) —']),
              div({display:'flex',flexWrap:'wrap',gap:'3px',justifyContent:'center'},
                GAMES.map(g=>btn(
                  {background:'rgba(249,168,37,0.12)',border:'1px solid rgba(249,168,37,0.3)',
                   color:'#ffcc02',borderRadius:'6px',padding:'4px 7px',fontSize:'9px'},
                  ()=>myEarlyBid(g),[g.n]
                ))
              ),
            ]):null,
          ]),

      btn({width:'100%',background:'rgba(229,57,53,0.2)',border:'1px solid rgba(229,57,53,0.4)',
           color:'#ef9a9a',borderRadius:'7px',padding:'8px',fontSize:'13px'},
        ()=>{
          jatekModeActive=false;
          if(inJatekResponse){
            // Passz Játék-response módban: licit véget ér
            state={...state,jatekResponseMode:false,passed:{...state.passed,[myIndex]:true}};
            _resolveAuction(state.highBidder,state.highBid);
          } else {
            myBid(null);
          }
        },[' ✗ Passz']),
    ]));
  } else if(s.phase==='bid'){
    children.push(div({padding:'5px 8px',textAlign:'center',flexShrink:'0'},[
      div({display:'inline-block',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',
           borderRadius:'7px',padding:'6px 16px',fontSize:'10px',color:'#81c784'},
        [pNames[s.bidder]+' licitál...'])
    ]));
  }

  // JÁTÉKVÁLASZTÁS
  if(s.phase==='selectGame'&&s.bidWinner===myIndex){
    children.push(div({padding:'5px 8px',flexShrink:'0'},[
      div({fontSize:'10px',color:'#a5d6a7',textAlign:'center',marginBottom:'5px'},
        ['Válassz játékot (min. '+s.highBid+'):']),
      div({display:'flex',flexWrap:'wrap',gap:'4px',justifyContent:'center'},
        GAMES.filter(g=>g.id>=s.highBid).map(g=>btn(
          {background:'rgba(249,168,37,0.15)',border:'1px solid rgba(249,168,37,0.4)',
           color:'#ffcc02',borderRadius:'7px',padding:'8px 12px',fontSize:'12px',fontWeight:'bold'},
          ()=>myPickGame(g),[g.n]
        ))
      ),
    ]));
  } else if(s.phase==='selectGame'){
    children.push(div({padding:'4px 8px',textAlign:'center',flexShrink:'0',fontSize:'10px',color:'#81c784'},
      [pNames[s.bidWinner]+' választ játékot...']));
  }

  // ELDOBÁS
  if(s.phase==='discard'&&s.bidWinner===myIndex){
    children.push(div({padding:'3px 8px',textAlign:'center',flexShrink:'0',fontSize:'11px',color:'#ff8a65'},
      ['👆 Koppints a lapra az eldobáshoz ('+(myHand.length-10)+' kell)']));
  } else if(s.phase==='discard'){
    children.push(div({padding:'3px 8px',textAlign:'center',flexShrink:'0',fontSize:'10px',color:'#81c784'},
      [pNames[s.bidWinner]+' eldob 2 lapot...']));
  }

  // NAPLÓ
  children.push(div({
    margin:'2px 8px',padding:'3px 8px',background:'rgba(0,0,0,0.1)',
    borderRadius:'5px',overflow:'hidden',maxHeight:'38px',flexShrink:'0'
  },
    s.log.slice(0,3).map((l,i)=>div({fontSize:'9px',color:i===0?'#a5d6a7':'rgba(165,214,167,0.3)',lineHeight:'1.4'},['• '+l]))
  ));

  // SAJÁT LAPOK
  children.push(div({marginTop:'auto',padding:'5px 6px 16px',flexShrink:'0'},[
    div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'},[
      div({fontSize:'9px',color:isMyTurn?'#ffcc02':'#a5d6a7'},[
        'Te ('+myHand.length+' lap)'+(isMyTurn?' 🎯':'')
      ]),
      div({fontSize:'9px',color:'#81c784'},[s.tw[myIndex]+' viteled']),
    ]),
    div({overflowX:'auto',paddingBottom:'3px'},[
      div({display:'flex',gap:'2px',flexWrap:'wrap',justifyContent:'center'},
        myHand.map(card=>{
          const isLifted=s.liftedCard===card.id;
          const canAct=(s.phase==='play'&&s.curP===myIndex)||(s.phase==='discard'&&s.bidWinner===myIndex);
          return renderCard(card,canAct?()=>{
            if(s.phase==='discard')myDiscard(card.id);
            else myPlay(card);
          }:null,isLifted,46,72);
        })
      ),
    ]),
    s.liftedCard?div({textAlign:'center',marginTop:'3px',fontSize:'10px',color:'#ffcc02'},
      [s.phase==='discard'?'Koppints újra → eldob!':'Koppints újra → lerak!']):null,
  ]));

  // JÁTÉK VÉGE OVERLAY
  if(s.phase==='result'&&s.gameOver){
    const ranking=_getRanking();
    const medals=['🥇','🥈','🥉'];
    children.push(div({
      position:'fixed',top:'0',left:'0',right:'0',bottom:'0',
      background:'rgba(0,0,0,0.95)',display:'flex',alignItems:'center',
      justifyContent:'center',zIndex:'60',overflowY:'auto'
    },[
      div({
        background:`linear-gradient(140deg,#1a0a00,#3e2700)`,
        border:'2px solid #f9a825',borderRadius:'16px',padding:'24px 20px',
        maxWidth:'320px',width:'90%',textAlign:'center',margin:'20px auto'
      },[
        div({fontSize:'40px',marginBottom:'4px'},['🏆']),
        el('h2',{style:{fontSize:'18px',color:'#ffcc02',margin:'0 0 4px'}},['JÁTÉK VÉGE!']),
        el('p',{style:{fontSize:'11px',color:'#a5d6a7',marginBottom:'14px'}},['Végeredmény (pincével együtt):']),
        // Rangsor
        div({background:'rgba(0,0,0,0.4)',borderRadius:'10px',padding:'10px',marginBottom:'12px'},
          ranking.map((r,rank)=>{
            const cellarSum=state.cellar.filter(c=>c.to===r.i).reduce((s,c)=>s+c.val,0);
            const inKalap=state.scores[r.i]>=0;
            return div({
              display:'flex',alignItems:'center',gap:'8px',padding:'7px 6px',
              borderBottom:rank<2?'1px solid rgba(255,255,255,0.08)':'none',
              background:rank===0?'rgba(249,168,37,0.1)':'none',borderRadius:'6px'
            },[
              div({fontSize:'20px'},[medals[rank]]),
              div({flex:'1',textAlign:'left'},[
                div({fontSize:'13px',fontWeight:'bold',color:r.i===myIndex?'#ffcc02':'white'},[
                  pNames[r.i]+(r.i===myIndex?' (Te)':'')
                ]),
                cellarSum>0?div({fontSize:'9px',color:'#ff8a65'},['Pince: '+cellarSum]):null,
              ]),
              div({textAlign:'right'},[
                div({fontSize:'18px',fontWeight:'bold',color:inKalap?'#ffee58':'#ef9a9a'},[
                  _fmtScore(state.scores[r.i])
                ]),
                div({fontSize:'9px',color:'rgba(255,255,255,0.5)'},['Végső: '+r.fs.toFixed(2)]),
              ]),
            ]);
          })
        ),
        // Visszatérés – kapcsolat megmarad!
        isHost
          ? btn({background:'#f9a825',color:'#1a1a1a',border:'none',borderRadius:'50px',
                 padding:'12px 32px',fontSize:'15px',fontWeight:'bold',width:'100%',marginBottom:'8px'},
              ()=>{
                // Visszatérés menübe, de a hálózat megmarad – csak a játék állapot resetelődik
                const prevScoreStart=state.startScore;
                state={...state,phase:'result',gameOver:false,
                  scores:[prevScoreStart,prevScoreStart,prevScoreStart],
                  cellar:[],log:[],round:0,
                  resultMsg:'Új játék! A gazda indítja az első kört.'
                };
                netPhase='ready'; render();
              },['🔄 Új játék (együtt maradunk)'])
          : div({fontSize:'12px',color:'#a5d6a7',padding:'8px',marginBottom:'8px'},
              ['⏳ Gazda indít új játékot...']),
        btn({background:'none',border:'1px solid rgba(255,255,255,0.15)',color:'rgba(255,255,255,0.4)',
             borderRadius:'50px',padding:'7px 18px',fontSize:'11px',width:'100%'},
          ()=>{netPhase='lobby';joinedCount=0;pConns=[null,null,null];hostConn=null;if(peer){peer.destroy();peer=null;}render();},[' ← Kilépés']),
      ]),
    ]));
  }

  // KÖR EREDMÉNY OVERLAY (normál, játék vége nélkül)
  if(s.phase==='result'&&!s.gameOver){
    const emoji=s.resultMsg.startsWith('✓')?'🏆':s.resultMsg.startsWith('✗')?'💀':
                s.resultMsg.startsWith('Körpassz')?'🔄':'🃏';
    children.push(div({
      position:'fixed',top:'0',left:'0',right:'0',bottom:'0',
      background:'rgba(0,0,0,0.9)',display:'flex',alignItems:'center',
      justifyContent:'center',zIndex:'50',overflowY:'auto'
    },[
      div({
        background:`linear-gradient(140deg,${DG},${G})`,
        border:'2px solid #4caf50',borderRadius:'16px',padding:'24px 20px',
        maxWidth:'320px',width:'90%',textAlign:'center',margin:'20px auto'
      },[
        div({fontSize:'32px',marginBottom:'6px'},[emoji]),
        el('h2',{style:{fontSize:'15px',margin:'0 0 10px',color:'#ffcc02',lineHeight:'1.4'}},[s.resultMsg||'Kör vége']),
        // Ponttáblázat
        div({background:'rgba(0,0,0,0.3)',borderRadius:'10px',padding:'10px',margin:'10px 0',fontSize:'11px'},[
          div({color:'#81c784',marginBottom:'6px',fontSize:'10px',letterSpacing:'1px'},['PONTSZÁMOK']),
          div({display:'flex',justifyContent:'space-around'},
            [0,1,2].map(i=>{
              const fs=_calcFinalScore(i);
              const cellarTotal=state.cellar.filter(c=>c.to===i).reduce((s,c)=>s+c.val,0);
              const inKalap=state.scores[i]>=0;
              return div({textAlign:'center'},[
                div({fontSize:'9px',color:i===myIndex?'#ffcc02':'#81c784',marginBottom:'2px'},[pNames[i]+(i===myIndex?' ★':'')]),
                div({fontSize:'20px',fontWeight:'bold',color:inKalap?'#ffee58':'white'},[_fmtScore(state.scores[i])]),
                cellarTotal>0?div({fontSize:'8px',color:'#ff8a65'},['Pince: '+cellarTotal]):null,
                div({fontSize:'9px',color:'rgba(255,255,255,0.5)'},['Végső: '+fs.toFixed(2)]),
              ]);
            })
          ),
        ]),
        // Pince részletek – összesített és lebontott nézet
        state.cellar.length>0?div({
          background:'rgba(0,0,0,0.25)',borderRadius:'10px',padding:'10px',
          margin:'8px 0',fontSize:'10px',textAlign:'left'
        },[
          div({color:'#ffcc02',marginBottom:'6px',fontWeight:'bold',fontSize:'11px'},['📋 Pince összesítő']),
          // Összesítés játékosonként
          div({display:'flex',gap:'6px',marginBottom:'6px'},
            [0,1,2].map(i=>{
              const rám=state.cellar.filter(c=>c.to===i).reduce((s,c)=>s+c.val,0);
              const tőlem=state.cellar.filter(c=>c.from===i).reduce((s,c)=>s+c.val,0);
              return div({
                flex:'1',background:'rgba(255,255,255,0.05)',borderRadius:'7px',padding:'6px',textAlign:'center'
              },[
                div({fontSize:'9px',color:i===myIndex?'#ffcc02':'#a5d6a7',marginBottom:'3px'},[pNames[i]]),
                rám>0?div({color:'#ff8a65',fontSize:'11px',fontWeight:'bold'},[`-${(rám/100).toFixed(2)} pt`]):null,
                rám>0?div({color:'rgba(255,100,80,0.6)',fontSize:'8px'},[`(${rám} pince rám)`]):null,
                tőlem>0?div({color:'rgba(150,200,150,0.7)',fontSize:'8px'},[`+${tőlem} írva másra`]):null,
                rám===0&&tőlem===0?div({color:'rgba(255,255,255,0.3)',fontSize:'9px'},['–']):null,
              ]);
            })
          ),
          // Utolsó 4 bejegyzés
          div({color:'rgba(255,255,255,0.35)',fontSize:'9px',marginTop:'4px',borderTop:'1px solid rgba(255,255,255,0.08)',paddingTop:'5px'},[
            'Utolsó bejegyzések:'
          ]),
          ...state.cellar.slice(-4).map(c=>
            div({color:'rgba(255,200,150,0.6)',fontSize:'9px',padding:'1px 0'},[
              `${pNames[c.from]} ✍ ${pNames[c.to]}: ${c.val}${c.desc?' ('+c.desc+')':''}`
            ])
          ),
        ]):null,
        isHost
          ? btn({background:'#f9a825',color:'#1a1a1a',border:'none',borderRadius:'50px',
                 padding:'11px 32px',fontSize:'14px',fontWeight:'bold',marginBottom:'8px',width:'100%'},
              startRound,['▶ Következő kör'])
          : div({fontSize:'12px',color:'#a5d6a7',padding:'8px',marginBottom:'8px'},
              ['⏳ Gazda indítja a következő kört...']),
        btn({background:'none',border:'1px solid rgba(255,255,255,0.15)',color:'rgba(255,255,255,0.4)',
             borderRadius:'50px',padding:'7px 18px',fontSize:'11px',width:'100%'},
          ()=>{netPhase='lobby';joinedCount=0;pConns=[null,null,null];hostConn=null;if(peer){peer.destroy();peer=null;}render();},[' ← Kilépés']),
      ]),
    ]));
  }

  return div({
    minHeight:'100vh',
    background:`linear-gradient(160deg,${DG} 0%,${G} 70%)`,
    display:'flex',flexDirection:'column',
    maxWidth:'480px',margin:'0 auto',position:'relative'
  },children);
}

// ═══ SZABÁLYZAT NÉZET ════════════════════════════════════════
function rRules(){
  const wrap=document.createElement('div');
  wrap.className='rules-modal';
  wrap.innerHTML=`
    <div class="rules-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h1 style="color:#ffcc02;font-size:20px;">📖 Preferansz Szabályzat</h1>
        <button onclick="showRules=false;render();" style="background:rgba(255,255,255,0.1);border:none;color:white;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:Georgia,serif;">✕ Bezár</button>
      </div>

      <h2>Alapok</h2>
      <p>32 lapos magyar kártyával, 3 játékossal játszható. A lapok sorrendje: <strong>7, 8, 9, 10, Alsó (A), Felső (F), Király (K), Ász (Á)</strong>.</p>
      <p>Az első osztót sorsolással döntik el: mindenki húz egy lapot, aki pirosat húz, az az első osztó.</p>

      <h2>Osztás</h2>
      <p>Az osztó keveri, majd a balján ülővel vágatja. Ezután <strong>egyesével oszt 5-5 lapot</strong> (ha nincs vágás, 5-ösével), majd félretesz 2 lapot (<em>talon</em>). Végül a maradék 5-5 lapot is kiosztja. Mindenki 10 lapot kap.</p>

      <h2>Licitálás</h2>
      <p>Az osztótól jobbra ülő kezdi a licitet. Licitálni <strong>1-től kell kezdeni</strong>, és egyesével lehet haladni. A játékok értéke és sorrendje:</p>
      <table>
        <tr><th>Érték</th><th>Játék</th><th>Típus</th></tr>
        <tr><td>2</td><td>Zöld (lapi)</td><td>Tromf (zöld)</td></tr>
        <tr><td>3</td><td>Sárga (tök)</td><td>Tromf (sárga)</td></tr>
        <tr><td>4</td><td>Piros (szív)</td><td>Tromf (piros)</td></tr>
        <tr><td>5</td><td>Makk</td><td>Tromf (makk)</td></tr>
        <tr><td>6</td><td>Betli</td><td>Különleges</td></tr>
        <tr><td>7</td><td>Mizer</td><td>Különleges</td></tr>
        <tr><td>8</td><td>Szanadu</td><td>Különleges</td></tr>
        <tr><td>9</td><td>Pikkoló</td><td>Különleges</td></tr>
        <tr><td>10</td><td>Preferansz</td><td>Min. 6 piros vitel · nincs tromf · 2. lapot tesz</td></tr>
      </table>
      <p>Aki megnyeri a licitet, megkapja és megnézi a talont (mindenki látja), majd felveszi, és eldönti a játékot. 2 lapot le kell raknia.</p>

      <h2>Különleges licitálási esetek</h2>
      <ul>
        <li><strong>Korai játék:</strong> Az első 5 lap után be lehet mondani játékot. Ebben az esetben az értéke <strong>megduplázódik</strong>, de a talont nem lehet felvenni.</li>
        <li><strong>„Játék" mondása (ugró licit):</strong> Ha valaki egynél többet akar ugrani a liciten (pl. Pirosról Szanadúra), azt csak a <strong>🎯 Játék gomb megnyomásával</strong> teheti. Ha valaki Játékot mond, a <strong>licit azonnal véget ér</strong> és ő nyer – kivéve ha a következő játékos nagyobb Játékot mond felé. Ilyenkor:
          <ul>
            <li>A talon <strong>nincs megmutatva</strong> és nem vehető fel</li>
            <li>A pontok és pince <strong>duplán számolódnak</strong> (nyerés és vesztés esetén egyaránt)</li>
          </ul>
        </li>
        <li><strong>Körpassz:</strong> Ha mindenki passzol, az osztó kijátsza a talon 2 lapját, mindenki látja. Az elvitt vitelek számát le kell vonni a saját pontszámból.</li>
      </ul>

      <h2>Játéktípusok</h2>
      <h3>Színjátékok (Zöld, Sárga, Piros, Makk)</h3>
      <p>A licitnyertesnek legalább <strong>6 vitelt</strong> kell szereznie a 10-ből. Az a szín a tromf, amit a licitnyertes választott. A legkisebb tromf is veri a többi szín legnagyobb lapját. Mindig az osztótól jobbra ülő kezd.</p>
      <p>Kötelező azonos színre menni. Ha nincs, kötelező tromfot rakni (ha van).</p>

      <h3>Betli (6)</h3>
      <p>A licitnyertes célja: <strong>egyetlen lapot sem vihet el</strong>. Nincs tromf.</p>

      <h3>Mizer (7)</h3>
      <p>A licitnyertes <strong>pontosan 1 lapot</strong> szeretne vinni, de az nem lehet sem az első, sem az utolsó menet.</p>

      <h3>Szanadu (8)</h3>
      <p>A licitnyertes célja <strong>6 vitel</strong>, de nincs tromf.</p>

      <h3>Pikkoló (9)</h3>
      <p>A licitnyertes célja <strong>pontosan 2 vitel</strong>, amelyek nem lehetnek egymás után (de lehet az első és az utolsó is).</p>

      <h3>Preferansz (10)</h3>
      <p>A licitnyertesnek <strong>minimum 6 piros (szív) vitelt</strong> kell szereznie. Ezeken felül lehet más vitele is. <strong>Nincs tromf.</strong> A licitnyertes a <strong>2. lapot teszi</strong> (az ellenfél kezd). A két ellenfél összefog és megpróbálja megakadályozni a 6 piros vitelt – ezt hívják aláhúzásnak. Ez a játék névadója és a legmagasabb licit (10).</p>

      <h2>Pontozás</h2>
      <p>Minden játékos saját pontszámot vezet. A játék megállapodás szerint indul (pl. -10). A cél: eljutni 0-ra (saját pont fent). A pluszt „^" kalappal jelöljük.</p>
      <ul>
        <li><strong>Ha a licitnyertes nyert:</strong> saját pontjából levonódik a játék értéke (pl. -10 → -5 ha makk=5 nyerés esetén). Az ellenfelek pincéjébe írjuk: vitelek száma × játék értéke.</li>
        <li><strong>Ha a licitnyertes bukott:</strong> saját pontjához hozzáadódik a játék értéke (pl. -10 → -15). Betli/Mizer/Pikkoló esetén <strong>ezen felül</strong> az ellenfél mind a ketten a játék értékének 5-szörösét írják a pincébe a vesztesnek.</li>
        <li><strong>🎯 Játék kör esetén:</strong> minden pont és pince bejegyzés <strong>duplán számolódik</strong> – mind nyerés, mind vesztés esetén, és a pincébe írás is dupla!</li>
      </ul>
      <p><strong>Végső pontszám:</strong> Saját pont – (pincébe írt összeg / 100). Az nyer, akinek a legnagyobb a végső pontszáma.</p>

      <h2>Különleges esetek</h2>
      <ul>
        <li><strong>Körpassz:</strong> Az elvitt vitelek számát LE KELL VONNI a saját pontból.</li>
        <li><strong>Ellenfél bukás (színjátéknál):</strong> Ha a két ellenfél összesen kevesebb mint 3 vitelt visz, aki 0-t vitt, az megbukott és -1 kerül a saját pontjához.</li>
        <li><strong>Szanadu és Preferansz</strong> bukásnál ugyanúgy, mint a színjátéknál kell írni a pincébe.</li>
      </ul>

      <div style="margin-top:20px;padding:12px;background:rgba(249,168,37,0.1);border-radius:8px;border:1px solid rgba(249,168,37,0.3);">
        <p style="color:#ffcc02;font-size:12px;text-align:center;margin-bottom:6px;"><strong>Játék vége:</strong> Akkor ér véget, ha <strong>bármelyik játékos</strong> saját pontja eléri vagy meghaladja a <strong>0-t</strong> (kalapba megy).</p>
        <p style="color:#a5d6a7;font-size:11px;text-align:center;">Az nyer, akinek a legnagyobb a végső pontszáma (pincével együtt számolva). Ha valaki 0 fölé kerül, az a szám <strong>kalapban</strong> jelenik meg: pl. <strong>^3</strong>. A rangsorban a legjobban kalapban lévő játékos az első.</p>
      </div>

      <div style="text-align:center;margin-top:20px;">
        <button onclick="showRules=false;render();" style="background:#f9a825;color:#1a1a1a;border:none;border-radius:20px;padding:10px 28px;font-size:14px;font-weight:bold;cursor:pointer;font-family:Georgia,serif;">← Vissza a játékhoz</button>
      </div>
    </div>
  `;
  return wrap;
}

// Indítás
try{render();}catch(e){document.getElementById('app').innerHTML='<div style="color:#ff8a65;padding:24px;text-align:center;font-family:Georgia,serif;"><b>Hiba:</b><br>'+e.message+'</div>';}
</script>
